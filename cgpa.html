<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
    
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Table</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:8px;
    font-family:Arial;
    background:#f5f7ff;
    overflow-x:hidden;
}

/* FILTERS */

.filter-container{

    width:100%;

    margin-bottom:10px;

    padding:8px;

    display:flex;

    gap:8px;

    flex-wrap:nowrap;

    overflow-x:auto;

    background:linear-gradient(
        135deg,
        #8fa8c7,
        #6f8fb8,
        #5f7faa,
        #4f6f99
    );

    border-radius:12px;

    scrollbar-width:none;
}

.filter-container::-webkit-scrollbar{
    height:0px;
}

.filter-container input,
.filter-container select{

    padding:7px 8px;

    border-radius:8px;

    border:none;

    min-width:135px;

    width:135px;

    flex-shrink:0;

    font-size:12px;

    background:white;
}

.filter-container input:focus,
.filter-container select:focus{

    outline:none;

    box-shadow:0 0 6px rgba(0,0,0,0.2);
}

/* TABLE */

.table-container{

    width:100%;

    overflow:auto;

    border-radius:10px;

    background:white;

    scrollbar-width:thin;
}

table{

    border-collapse:collapse;

    width:max-content;

    min-width:100%;

    table-layout:auto;

    background:white;
}

/* HEADERS */

th{

    background:linear-gradient(
        135deg,
        #0b3d91,
        #1565c0,
        #1e88e5
    );

    color:white;

    padding:10px 14px;

    text-align:center;

    white-space:nowrap;

    position:sticky;

    top:0;

    z-index:2;

    font-size:13px;

    width:auto;

    min-width:max-content;
}

/* CELLS */

td{

    padding:8px 14px;

    text-align:center;

    border-bottom:1px solid #ddd;

    white-space:nowrap;

    font-size:12px;

    width:auto;

    min-width:max-content;
}

/* ROW COLORS */

tr:nth-child(even){
    background:#f9fbff;
}

tr:hover{
    background:#e8ddff;
}

/* LOADING */

.loading{

    text-align:center;

    margin-top:20px;

    font-size:20px;

    color:#0b3d91;
}

/* MOBILE RESPONSIVE */

@media(max-width:768px){

    body{
        padding:5px;
    }

    .filter-container{

        gap:6px;

        padding:6px;
    }

    .filter-container input,
    .filter-container select{

        min-width:120px;

        width:120px;

        font-size:11px;

        padding:6px 7px;
    }

    th{

        font-size:11px;

        padding:8px 10px;
    }

    td{

        font-size:11px;

        padding:7px 10px;
    }

    .loading{
        font-size:18px;
    }
}

@media(max-width:480px){

    .filter-container input,
    .filter-container select{

        min-width:110px;

        width:110px;

        font-size:10px;
    }

    th{

        font-size:10px;

        padding:7px 9px;
    }

    td{

        font-size:10px;

        padding:6px 9px;
    }
}

/* CGPA SECTION */

.cgpa-main-container{

    width:100%;

    display:flex;

    gap:12px;

    margin-bottom:12px;

    flex-wrap:wrap;
}

.cgpa-card{

    flex:1;

    min-width:220px;

    padding:18px;

    border-radius:16px;

    color:white;

    box-shadow:0 4px 14px rgba(0,0,0,0.18);

    transition:0.3s;
}

/* CARD 1 */

.cgpa-card:nth-child(1){

    background:linear-gradient(
        135deg,
        #11998e,
        #38ef7d
    );
}

/* CARD 2 */

.cgpa-card:nth-child(2){

    background:linear-gradient(
        135deg,
        #fc4a1a,
        #f7b733
    );
}

/* CARD 3 */

.cgpa-card:nth-child(3){

    background:linear-gradient(
        135deg,
        #396afc,
        #2948ff
    );
}

.cgpa-card:hover{

    transform:translateY(-3px);
}

.cgpa-card h3{

    margin:0 0 12px;

    font-size:16px;

    color:white;

    font-weight:bold;
}

.cgpa-card input{

    width:100%;

    padding:10px;

    border-radius:10px;

    border:none;

    outline:none;

    font-size:14px;

    box-sizing:border-box;

    background:rgba(255,255,255,0.95);
}

.cgpa-range{

    display:flex;

    gap:8px;
}
/* MOBILE */

@media(max-width:768px){

    .cgpa-main-container{

        flex-direction:column;
    }

    .cgpa-card{

        width:100%;
    }
}
    
</style>
</head>

<body>

    <!-- CGPA FILTER SECTION -->

<div class="cgpa-main-container">

    <!-- GREATER -->

    <div class="cgpa-card">

        <h3>CGPA ≥</h3>

        <input type="number"
               step="0.01"
               id="cgpaGreater"
               placeholder="Enter Minimum CGPA">

    </div>

    <!-- LESS -->

    <div class="cgpa-card">

        <h3>CGPA ≤</h3>

        <input type="number"
               step="0.01"
               id="cgpaLess"
               placeholder="Enter Maximum CGPA">

    </div>

    <!-- BETWEEN -->

    <div class="cgpa-card">

        <h3>CGPA Between</h3>

        <div class="cgpa-range">

            <input type="number"
                   step="0.01"
                   id="cgpaMin"
                   placeholder="Min">

            <input type="number"
                   step="0.01"
                   id="cgpaMax"
                   placeholder="Max">

        </div>

    </div>

</div>

<!-- FILTERS -->

<div class="filter-container">

    <input type="text" id="searchInput" placeholder="Search">

    <select id="branchFilter">
        <option value="">Branch</option>
    </select>

    <select id="backlogFilter">
        <option value="">Backlogs</option>
    </select>

    <select id="genderFilter">
        <option value="">Gender</option>
    </select>

    <select id="cgpaFilter">
        <option value="">CGPA</option>
    </select>

    <select id="registeredFilter">
        <option value="">Registered</option>
    </select>

    <select id="offersFilter">
        <option value="">Offers</option>
    </select>

</div>

<!-- LOADING -->

<div class="loading" id="loading">
Loading Data...
</div>

<!-- TABLE -->

<div class="table-container">

    <table id="dataTable"></table>

</div>

<script>

const csvURL = localStorage.getItem("csvURL");

let originalData = [];
let headers = [];

Papa.parse(csvURL, {

    download:true,
    skipEmptyLines:true,

    complete:function(results){

        headers = results.data[0];
        originalData = results.data.slice(1);

        populateFilters(originalData);

        applyFilters();

        document.getElementById("loading").style.display = "none";
    }
});

/* FILTER IDS */

const searchInput = document.getElementById("searchInput");

const branchFilter = document.getElementById("branchFilter");
const backlogFilter = document.getElementById("backlogFilter");
const genderFilter = document.getElementById("genderFilter");
const cgpaFilter = document.getElementById("cgpaFilter");
const registeredFilter = document.getElementById("registeredFilter");
const offersFilter = document.getElementById("offersFilter");
const cgpaGreater =
document.getElementById("cgpaGreater");

const cgpaLess =
document.getElementById("cgpaLess");

const cgpaMin =
document.getElementById("cgpaMin");

const cgpaMax =
document.getElementById("cgpaMax");    

/* EVENTS */

searchInput.addEventListener("input",applyFilters);

branchFilter.addEventListener("change",applyFilters);
backlogFilter.addEventListener("change",applyFilters);
genderFilter.addEventListener("change",applyFilters);
cgpaFilter.addEventListener("change",applyFilters);
registeredFilter.addEventListener("change",applyFilters);
offersFilter.addEventListener("change",applyFilters);
 cgpaGreater.addEventListener("input",applyFilters);

cgpaLess.addEventListener("input",applyFilters);

cgpaMin.addEventListener("input",applyFilters);

cgpaMax.addEventListener("input",applyFilters);   

/* POPULATE FILTERS */

function populateFilters(data){

    fillFilter(branchFilter,"Branch",data);

    fillFilter(backlogFilter,"No. of Backlogs",data);

    fillFilter(genderFilter,"Gender",data);

    fillFilter(cgpaFilter,"CGPA",data);

    fillFilter(registeredFilter,"Registered for Placements",data);

    fillFilter(offersFilter,"No. of Offers",data);
}

/* FILL FILTER */

function fillFilter(filter,column,data){

    const index = headers.indexOf(column);

    let values = [...new Set(
        data.map(row => row[index])
    )];

    values = values.filter(v => v !== "");

    filter.innerHTML =
    `<option value="">${column}</option>`;

    values.sort().forEach(value=>{

        filter.innerHTML +=
        `<option value="${value}">${value}</option>`;
    });
}

/* APPLY FILTERS */

function applyFilters(){

    const search = searchInput.value.toLowerCase();

    const filters = {

        branch: branchFilter.value,
        backlog: backlogFilter.value,
        gender: genderFilter.value,
         cgpa: headers.indexOf("CGPA"),
        cgpa: cgpaFilter.value,
        registered: registeredFilter.value,
        offers: offersFilter.value
    };

    const indexes = {

        branch: headers.indexOf("Branch"),
        backlog: headers.indexOf("No. of Backlogs"),
        gender: headers.indexOf("Gender"),
        cgpa: headers.indexOf("CGPA"),
        registered: headers.indexOf("Registered for Placements"),
        offers: headers.indexOf("No. of Offers")
    };

    let filtered = originalData.filter(row=>{

        const rowText = row.join(" ").toLowerCase();

        return (

            rowText.includes(search)

            &&

            (!filters.branch ||
            row[indexes.branch] === filters.branch)

            &&

            (!filters.backlog ||
            row[indexes.backlog] === filters.backlog)

            &&

            (!filters.gender ||
            row[indexes.gender] === filters.gender)

            &&

(function(){

    let studentCGPA =
    parseFloat(row[indexes.cgpa]) || 0;

    /* GREATER */

    if(cgpaGreater.value){

        if(
            studentCGPA <
            parseFloat(cgpaGreater.value)
        ){

            return false;
        }
    }

    /* LESS */

    if(cgpaLess.value){

        if(
            studentCGPA >
            parseFloat(cgpaLess.value)
        ){

            return false;
        }
    }

    /* BETWEEN */

    if(cgpaMin.value && cgpaMax.value){

        if(

            studentCGPA <
            parseFloat(cgpaMin.value)

            ||

            studentCGPA >
            parseFloat(cgpaMax.value)

        ){

            return false;
        }
    }

    return true;

})()

            &&

            (!filters.registered ||
            row[indexes.registered]
            .toLowerCase()
            .trim() ===
            filters.registered
            .toLowerCase()
            .trim())

            &&

            (!filters.offers ||
            row[indexes.offers] === filters.offers)

        );
    });

    createTable(headers,filtered);
}

/* CREATE TABLE */

function createTable(headers,rows){

    let tableHTML = "<thead><tr>";

    headers.forEach(header=>{

        tableHTML += `<th>${header}</th>`;
    });

    tableHTML += "</tr></thead>";

    tableHTML += "<tbody>";

    rows.forEach(row=>{

        tableHTML += "<tr>";

        row.forEach(cell=>{

            tableHTML += `<td>${cell}</td>`;
        });

        tableHTML += "</tr>";
    });

    tableHTML += "</tbody>";

    document.getElementById("dataTable").innerHTML = tableHTML;
}

</script>

</body>
</html>
