<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CGPA Analysis</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:#f5f7ff;
}

/* HEADER */

.header{
    background:linear-gradient(
        135deg,
        #0b1f4d,
        #163b8c
    );

    color:white;

    text-align:center;

    padding:15px;
}

/* TABLE */

.table-container{
    width:95%;
    margin:20px auto;

    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#1565c0;
    color:white;

    padding:10px;

    font-size:14px;
}

td{
    padding:8px;

    text-align:center;

    border-bottom:1px solid #ddd;

    font-size:13px;
}

tr:nth-child(even){
    background:#f1f6ff;
}

tr:hover{
    background:#dbe9ff;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

    <h1>CGPA Analysis Dashboard</h1>

</div>

<!-- TABLE -->

<div class="table-container">

    <table id="summaryTable">

        <tr>

            <th>S.No</th>

            <th>Branch</th>

            <th>Total Students</th>

            <th>Registered for Placements</th>

            <th>Company Placed</th>

            <th>No. of Offers</th>

        </tr>

    </table>

</div>

</body>

</html>
