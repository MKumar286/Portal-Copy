<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Table</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
    margin:0;
    padding:10px;
    font-family:Arial;
    background:#f5f7ff;
}

/* FILTERS */
/* FILTER CONTAINER */

.filter-container{

    width:100%;

    margin-bottom:10px;

    padding:8px;

    display:flex;

    gap:8px;

    flex-wrap:nowrap;

    overflow-x:auto;

    background:linear-gradient(
        135deg,
        #8fa8c7,
        #6f8fb8,
        #5f7faa,
        #4f6f99
    );

    border-radius:12px;
}

/* FILTER INPUTS */

.filter-container input,
.filter-container select{

    padding:7px 8px;

    border-radius:8px;

    border:none;

    min-width:140px;

    width:140px;

    flex-shrink:0;

    font-size:12px;

    background:white;
}

/* REMOVE SCROLLBAR */

.filter-container::-webkit-scrollbar{
    height:0px;
}

/* TABLE */

/* TABLE CONTAINER */

.table-container{

    width:100%;

    overflow:auto;

    border-radius:10px;
}

/* TABLE */

table{

    border-collapse:collapse;

    width:max-content;

    min-width:100%;

    background:white;

    table-layout:auto;
}

/* TABLE HEADERS */

th{

    background:linear-gradient(
        135deg,
        #0b3d91,
        #1565c0,
        #1e88e5
    );

    color:white;

    padding:10px 14px;

    text-align:center;

    position:sticky;

    top:0;

    z-index:2;

    white-space:nowrap;

    width:auto;

    min-width:max-content;
}

/* TABLE CELLS */

td{

    padding:8px 14px;

    text-align:center;

    border-bottom:1px solid #ddd;

    white-space:nowrap;

    width:auto;

    min-width:max-content;
}
    tr:nth-child(even){
    background:#f9fbff;
}

tr:hover{
    background:#e8ddff;
}

.loading{

    text-align:center;

    margin-top:20px;

    font-size:22px;

    color:#0b3d91;
}

</style>
</head>

<body>

<!-- FILTERS -->

<div class="filter-container">

    <input type="text" id="searchInput" placeholder="Search Any Data">

    <select id="branchFilter">
        <option value="">Branch</option>
    </select>

    <select id="backlogFilter">
        <option value="">No. of Backlogs</option>
    </select>

    <select id="genderFilter">
        <option value="">Gender</option>
    </select>

    <select id="cgpaFilter">
        <option value="">CGPA</option>
    </select>

    <select id="registeredFilter">
        <option value="">Registered for Placements</option>
    </select>

    <select id="offersFilter">
        <option value="">No. of Offers</option>
    </select>

</div>

<!-- LOADING -->

<div class="loading" id="loading">
Loading Data...
</div>

<!-- TABLE -->

<div class="table-container">

    <table id="dataTable"></table>

</div>

<script>

const csvURL = localStorage.getItem("csvURL");

let originalData = [];
let headers = [];

Papa.parse(csvURL, {

    download:true,
    skipEmptyLines:true,

    complete:function(results){

        headers = results.data[0];
        originalData = results.data.slice(1);

        populateFilters(originalData);

        applyFilters();

        document.getElementById("loading").style.display = "none";
    }
});

/* FILTER IDS */

const searchInput = document.getElementById("searchInput");

const branchFilter = document.getElementById("branchFilter");
const backlogFilter = document.getElementById("backlogFilter");
const genderFilter = document.getElementById("genderFilter");
const cgpaFilter = document.getElementById("cgpaFilter");
const registeredFilter = document.getElementById("registeredFilter");
const offersFilter = document.getElementById("offersFilter");

/* EVENTS */

searchInput.addEventListener("input",applyFilters);

branchFilter.addEventListener("change",applyFilters);
backlogFilter.addEventListener("change",applyFilters);
genderFilter.addEventListener("change",applyFilters);
cgpaFilter.addEventListener("change",applyFilters);
registeredFilter.addEventListener("change",applyFilters);
offersFilter.addEventListener("change",applyFilters);

/* POPULATE FILTERS */

function populateFilters(data){

    fillFilter(branchFilter,"Branch",data);

    fillFilter(backlogFilter,"No. of Backlogs",data);

    fillFilter(genderFilter,"Gender",data);

    fillFilter(cgpaFilter,"CGPA",data);

    fillFilter(registeredFilter,"Registered for Placements",data);

    fillFilter(offersFilter,"No. of Offers",data);
}

/* FILL FILTER */

function fillFilter(filter,column,data){

    const index = headers.indexOf(column);

    let values = [...new Set(
        data.map(row => row[index])
    )];

    values = values.filter(v => v !== "");

    filter.innerHTML =
    `<option value="">${column}</option>`;

    values.sort().forEach(value=>{

        filter.innerHTML +=
        `<option value="${value}">${value}</option>`;

    });
}

/* APPLY FILTERS */

function applyFilters(){

    const search = searchInput.value.toLowerCase();

    const filters = {

        branch: branchFilter.value,
        backlog: backlogFilter.value,
        gender: genderFilter.value,
        cgpa: cgpaFilter.value,
        registered: registeredFilter.value,
        offers: offersFilter.value
    };

    const indexes = {

        branch: headers.indexOf("Branch"),
        backlog: headers.indexOf("No. of Backlogs"),
        gender: headers.indexOf("Gender"),
        cgpa: headers.indexOf("CGPA"),
        registered: headers.indexOf("Registered for Placements"),
        offers: headers.indexOf("No. of Offers")
    };

    let filtered = originalData.filter(row=>{

        const rowText = row.join(" ").toLowerCase();

        return (

            rowText.includes(search)

            &&

            (!filters.branch ||
            row[indexes.branch] === filters.branch)

            &&

            (!filters.backlog ||
            row[indexes.backlog] === filters.backlog)

            &&

            (!filters.gender ||
            row[indexes.gender] === filters.gender)

            &&

            (!filters.cgpa ||
            row[indexes.cgpa] === filters.cgpa)

            &&

            (!filters.registered ||
            row[indexes.registered]
            .toLowerCase()
            .trim() ===
            filters.registered
            .toLowerCase()
            .trim())

            &&

            (!filters.offers ||
            row[indexes.offers] === filters.offers)

        );

    });

    createTable(headers,filtered);
}

/* CREATE TABLE */
function createTable(headers,rows){

    let tableHTML = "<thead><tr>";

    headers.forEach(header=>{

        tableHTML += `<th>${header}</th>`;

    });

    tableHTML += "</tr></thead>";

    tableHTML += "<tbody>";

    rows.forEach(row=>{

        tableHTML += "<tr>";

        row.forEach(cell=>{

            tableHTML += `<td>${cell}</td>`;

        });

        tableHTML += "</tr>";
    });

    tableHTML += "</tbody>";

    document.getElementById("dataTable").innerHTML = tableHTML;
}

</script>

</body>
</html>
