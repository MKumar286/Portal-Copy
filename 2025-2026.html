<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2025-2026</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
    margin:0;
    padding:20px;
    font-family:Arial;
    background:#f2f5ff;
}

h1{
    text-align:center;
    color:#0b3d91;
}

h2{
    text-align:center;
    color:#444;
}

.cards-container{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin-top:25px;
}
.card{
    height:85px;
    border-radius:22px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    transition:all 0.3s ease;
    box-shadow:0 8px 20px rgba(0,0,0,0.18);
    backdrop-filter:blur(8px);
    letter-spacing:0.5px;
    text-align:center;
    padding:10px;
}

.card:hover{
    transform:translateY(-6px) scale(1.03);
    box-shadow:0 12px 25px rgba(0,0,0,0.25);
}

.card:hover{
    transform:scale(1.05);
}

table{
    width:100%;
    margin-top:25px;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

th{
    background:#0b3d91;
    color:white;
}

.loading{
    text-align:center;
    margin-top:20px;
    font-size:20px;
    color:#0b3d91;
}

</style>
</head>

<body>

<h1>Mahatma Gandhi Institute of Technology</h1>
<h2>Training and Placement Cell</h2>
<h3>Academic Year 2025-2026</h3>

<div class="cards-container" id="cardsContainer"></div>

<div class="loading" id="loading"></div>

<table id="dataTable"></table>

<script>

const csvLinks = {

A:"https://docs.google.com/spreadsheets/d/e/2PACX-1vSFxqsJB3rQHXWjpl3ofrPYtZ8ljCKJRVwhzwD0aWDz19Waec_2gXp2YpHMa4g72MA7BIBvdVEAF_fg/pub?gid=1145740463&single=true&output=csv",

B:"",
C:"",
D:"",
E:"",
F:"",
G:"",
H:"",
I:"",
J:"",
K:"",
L:"",
M:"",
N:"",
O:"",
P:"",
Q:"",
R:""

};

const colors = [

"linear-gradient(135deg,#667eea,#764ba2)",
"linear-gradient(135deg,#f093fb,#f5576c)",
"linear-gradient(135deg,#4facfe,#00f2fe)",
"linear-gradient(135deg,#43e97b,#38f9d7)",
"linear-gradient(135deg,#fa709a,#fee140)",
"linear-gradient(135deg,#30cfd0,#330867)",
"linear-gradient(135deg,#5ee7df,#b490ca)",
"linear-gradient(135deg,#ff9966,#ff5e62)",
"linear-gradient(135deg,#56ab2f,#a8e063)",
"linear-gradient(135deg,#614385,#516395)",
"linear-gradient(135deg,#ee0979,#ff6a00)",
"linear-gradient(135deg,#11998e,#38ef7d)",
"linear-gradient(135deg,#fc466b,#3f5efb)",
"linear-gradient(135deg,#8360c3,#2ebf91)",
"linear-gradient(135deg,#ff758c,#ff7eb3)",
"linear-gradient(135deg,#06beb6,#48b1bf)",
"linear-gradient(135deg,#8e2de2,#4a00e0)",
"linear-gradient(135deg,#f7971e,#ffd200)"

];
const container = document.getElementById("cardsContainer");

Object.keys(csvLinks).forEach((key,index)=>{

    const card=document.createElement("div");

    card.className="card";

    card.style.background=colors[index];

  const cardNames = {
    A:"Total Students Data",
    B:"Infosys",
    C:"Wipro",
    D:"Accenture",
    E:"Capgemini",
    F:"Cognizant",
    G:"Deloitte",
    H:"IBM",
    I:"Tech Mahindra",
    J:"HCL",
    K:"Oracle",
    L:"Amazon",
    M:"Google",
    N:"Microsoft",
    O:"KPIT",
    P:"Zoho",
    Q:"Hexaware",
    R:"Genpact"
};

card.innerHTML = cardNames[key];

    card.onclick = () => {

    localStorage.setItem("csvURL", csvLinks[key]);

    window.location.href = "table.html";

};

    container.appendChild(card);

});

function loadCSV(url){

    if(url===""){
        alert("CSV Link Not Added");
        return;
    }

    document.getElementById("loading").innerHTML="Loading Data...";

    Papa.parse(url,{

        download:true,

        complete:function(results){

            let data=results.data;

            let tableHTML="";

            data.forEach((row,rowIndex)=>{

                tableHTML+="<tr>";

                row.forEach(cell=>{

                    if(rowIndex===0){
                        tableHTML+=`<th>${cell}</th>`;
                    }else{
                        tableHTML+=`<td>${cell}</td>`;
                    }

                });

                tableHTML+="</tr>";

            });

            document.getElementById("dataTable").innerHTML=tableHTML;

            document.getElementById("loading").innerHTML="";

        },

        error:function(){

            document.getElementById("loading").innerHTML="Unable to Load CSV Data";

        }

    });

}

</script>

</body>
</html>
