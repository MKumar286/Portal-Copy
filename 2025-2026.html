<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2025-2026</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>



.cards-container{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
    margin-top:30px;
}

.card{
    position:relative;
    height:110px;
    border-radius:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 25px;
    overflow:hidden;
    cursor:pointer;
    transition:0.4s ease;
    background:#111827;
    border:3px solid transparent;
    box-shadow:0 0 15px rgba(0,0,0,0.4);
}

/* glowing hover */

.card:hover{
    transform:translateY(-6px) scale(1.02);
    box-shadow:
    0 0 15px currentColor,
    0 0 30px currentColor;
}

/* left section */

.card-content{
    display:flex;
    align-items:center;
    gap:18px;
    z-index:2;
}

/* icon image */

.card-content img{
    width:48px;
    height:48px;
    object-fit:contain;
}

/* title */

.card-title{
    color:white;
    font-size:24px;
    font-weight:bold;
    line-height:1.2;
}

/* open curved side */

.card::after{
    content:"";
    position:absolute;
    right:-45px;
    width:120px;
    height:120px;
    border-radius:50%;
    background:#0f172a;
    border:4px solid currentColor;
}

/* glowing circle */

.circle{
    position:absolute;
    right:18px;
    width:55px;
    height:55px;
    border-radius:50%;
    background:white;
    box-shadow:
    0 0 10px white,
    0 0 25px currentColor;
    z-index:3;
}


.card:hover{
    transform:scale(1.05);
}

table{
    width:100%;
    margin-top:25px;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

th{
    background:#0b3d91;
    color:white;
}

.loading{
    text-align:center;
    margin-top:20px;
    font-size:20px;
    color:#0b3d91;
}

</style>
</head>

<body>

<h1>Mahatma Gandhi Institute of Technology</h1>
<h2>Training and Placement Cell</h2>
<h3>Academic Year 2025-2026</h3>

<div class="cards-container" id="cardsContainer"></div>

<div class="loading" id="loading"></div>

<table id="dataTable"></table>

<script>

const csvLinks = {

A:"https://docs.google.com/spreadsheets/d/e/2PACX-1vSFxqsJB3rQHXWjpl3ofrPYtZ8ljCKJRVwhzwD0aWDz19Waec_2gXp2YpHMa4g72MA7BIBvdVEAF_fg/pub?gid=1145740463&single=true&output=csv",

B:"",
C:"",
D:"",
E:"",
F:"",
G:"",
H:"",
I:"",
J:"",
K:"",
L:"",
M:"",
N:"",
O:"",
P:"",
Q:"",
R:""

};

const colors = [

"#3B82F6",
"#A855F7",
"#84CC16",
"#F97316",
"#06B6D4",
"#EF4444",
"#14B8A6",
"#3B82F6",
"#FACC15",
"#A855F7",
"#EF4444",
"#F59E0B",
"#22C55E",
"#0EA5E9",
"#9333EA",
"#EC4899",
"#06B6D4",
"#EAB308"

];
    
const container = document.getElementById("cardsContainer");

Object.keys(csvLinks).forEach((key,index)=>{

    const logos = {

A:"https://cdn-icons-png.flaticon.com/512/3135/3135715.png",

    G:"Deloitte",

    J:"HCL",
    K:"Oracle",
    L:"Amazon",
    M:"Google",
    N:"Microsoft",
    O:"KPIT",
    P:"Zoho",
    Q:"Hexaware",
    R:"Genpact"
};

card.innerHTML = cardNames[key];

    card.onclick = () => {

    localStorage.setItem("csvURL", csvLinks[key]);

    window.location.href = "table.html";

};

    container.appendChild(card);

});

function loadCSV(url){

    if(url===""){
        alert("CSV Link Not Added");
        return;
    }

    document.getElementById("loading").innerHTML="Loading Data...";

    Papa.parse(url,{

        download:true,

        complete:function(results){

            let data=results.data;

            let tableHTML="";

            data.forEach((row,rowIndex)=>{

                tableHTML+="<tr>";

                row.forEach(cell=>{

                    if(rowIndex===0){
                        tableHTML+=`<th>${cell}</th>`;
                    }else{
                        tableHTML+=`<td>${cell}</td>`;
                    }

                });

                tableHTML+="</tr>";

            });

            document.getElementById("dataTable").innerHTML=tableHTML;

            document.getElementById("loading").innerHTML="";

        },

        error:function(){

            document.getElementById("loading").innerHTML="Unable to Load CSV Data";

        }

    });

}

</script>

</body>
</html>
