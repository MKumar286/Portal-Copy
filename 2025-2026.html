<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2025-2026</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>



.cards-container{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
    margin-top:30px;
}

.card{
    position:relative;
    height:50px;   /* decreased height */
    border-radius:50px;
    display:flex;
    align-items:center;
    justify-content:center; /* center content */
    padding:0 20px;
    overflow:hidden;
    cursor:pointer;
    transition:0.4s ease;
    background:#111827;
    border:3px solid transparent;
    box-shadow:0 0 15px rgba(0,0,0,0.4);
}

/* glowing hover */

.card:hover{
    transform:translateY(-6px) scale(1.02);
    box-shadow:
    0 0 15px currentColor,
    0 0 30px currentColor;
}

/* left section */

.card-content{
    display:flex;
    align-items:center;
    justify-content:center;
    width:100%;
    z-index:2;
}

/* icon image */



/* title */

.card-title{
    color:white;
    font-size:15px;
    font-weight:bold;
    text-align:center;
    font-family:'Segoe UI',sans-serif;
    width:100%;
}

/* open curved side */

.card::after{
    content:"";
    position:absolute;
    right:-40px;
    width:95px;
    height:95px;
    border-radius:50%;
    background:#0f172a;
    border:4px solid currentColor;
}

/* glowing circle */

.circle{
    position:absolute;
    right:14px;
    width:42px;
    height:42px;
    border-radius:50%;
    background:white;
    box-shadow:
    0 0 10px white,
    0 0 20px currentColor;
    z-index:3;
}


.card:hover{
    transform:scale(1.05);
}

table{
    width:100%;
    margin-top:25px;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

th{
    background:#0b3d91;
    color:white;
}

.loading{
    text-align:center;
    margin-top:20px;
    font-size:20px;
    color:#0b3d91;
}

</style>
</head>

<body>

<h1>Mahatma Gandhi Institute of Technology</h1>
<h2>Training and Placement Cell</h2>
<h3>Academic Year 2025-2026</h3>

<div class="cards-container" id="cardsContainer"></div>

<div class="loading" id="loading"></div>

<table id="dataTable"></table>

<script>

const csvLinks = {

A:"https://docs.google.com/spreadsheets/d/e/2PACX-1vSFxqsJB3rQHXWjpl3ofrPYtZ8ljCKJRVwhzwD0aWDz19Waec_2gXp2YpHMa4g72MA7BIBvdVEAF_fg/pub?gid=1145740463&single=true&output=csv",

B:"",
C:"",
D:"",
E:"",
F:"",
G:"",
H:"",
I:"",
J:"",
K:"",
L:"",
M:"",
N:"",
O:"",
P:"",
Q:"",
R:""

};

const colors = [

"#3B82F6",
"#A855F7",
"#84CC16",
"#F97316",
"#06B6D4",
"#EF4444",
"#14B8A6",
"#3B82F6",
"#FACC15",
"#A855F7",
"#EF4444",
"#F59E0B",
"#22C55E",
"#0EA5E9",
"#9333EA",
"#EC4899",
"#06B6D4",
"#EAB308"

];
    
const container = document.getElementById("cardsContainer");

 const cardNames = {
    A:"Master Data of the Students",
    B:"Placed Students Data with Offer Letters",
    C:"Deprtment Wise Placement Details",
    D:"Mail Confirmation of the Placed Students ",
    E:"Nature of the offers (IT/Core)",
    F:"Salary Details",
    G:"Placement Report",
    H:"Companys-HR Contact Details",
    I:"Company wise Registered Students Data",
    J:"Company Visits Department Wise",
    K:"Company wise Placement Tracker",
    L:"Placement Percentage",
    M:"Internship Details",
    N:"Photos - Drives",
    O:"Placement Progression",
    P:"Company wise - All Students Registrations",
    Q:"Ciculars",
    R:"Shared Data for NBA & NIRF"
};
    

Object.keys(csvLinks).forEach((key,index)=>{


const card=document.createElement("div");

card.className="card";

card.style.color=colors[index];

card.style.borderColor=colors[index];
card.innerHTML = `

<div class="card-content">

<div class="card-title">
${cardNames[key]}
</div>

</div>

<div class="circle"></div>

`;

 

 card.onclick = () => {

    if(key === "A"){
        window.location.href = "table.html";
    }

    else if(key === "B"){
        window.location.href = "Placed_Students_Data.html";
    }

    else if(key === "C"){
        window.location.href = "wipro.html";
    }

    else if(key === "D"){
        window.location.href = "accenture.html";
    }

    else if(key === "E"){
        window.location.href = "capgemini.html";
    }

    else{

        localStorage.setItem("csvURL", csvLinks[key]);

        window.location.href = "table.html";

    }

};

    container.appendChild(card);

});

function loadCSV(url){

    if(url===""){
        alert("CSV Link Not Added");
        return;
    }

    document.getElementById("loading").innerHTML="Loading Data...";

    Papa.parse(url,{

        download:true,

        complete:function(results){

            let data=results.data;

            let tableHTML="";

            data.forEach((row,rowIndex)=>{

                tableHTML+="<tr>";

                row.forEach(cell=>{

                    if(rowIndex===0){
                        tableHTML+=`<th>${cell}</th>`;
                    }else{
                        tableHTML+=`<td>${cell}</td>`;
                    }

                });

                tableHTML+="</tr>";

            });

            document.getElementById("dataTable").innerHTML=tableHTML;

            document.getElementById("loading").innerHTML="";

        },

        error:function(){

            document.getElementById("loading").innerHTML="Unable to Load CSV Data";

        }

    });

}

</script>

</body>
</html>
