
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MGIT Placement Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    padding:18px;

    background:
    radial-gradient(circle at top left,#ff6a00 0%,transparent 25%),
    radial-gradient(circle at bottom right,#7c3aed 0%,transparent 30%),
    linear-gradient(135deg,#050816,#0B1026,#111827,#1E1B4B);

    background-attachment:fixed;
    overflow-x:hidden;
}

/* HEADER */

.main-header{
    width:100%;
    border-radius:30px;
    padding:26px 30px;

    background:linear-gradient(135deg,
    rgba(11,61,145,0.95),
    rgba(37,99,235,0.95));

    border:2px solid rgba(255,255,255,0.1);

    box-shadow:
    0 0 25px rgba(37,99,235,0.4),
    0 8px 30px rgba(0,0,0,0.35);

    position:relative;
    overflow:hidden;
}

.main-header::before{
    content:'';
    position:absolute;
    width:350px;
    height:350px;
    background:rgba(255,255,255,0.06);
    border-radius:50%;
    right:-120px;
    top:-120px;
}

.header-flex{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:25px;
    position:relative;
    z-index:2;
}

.logo{
    width:110px;
    height:110px;
    border-radius:50%;
    border:3px solid rgba(255,255,255,0.2);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:42px;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);

    box-shadow:0 0 18px rgba(255,255,255,0.2);
}

.header-text{
    text-align:center;
}

.header-text h1{
    color:white;
    font-size:54px;
    font-weight:700;
    letter-spacing:1px;
}

.header-text h2{
    margin-top:8px;
    color:#FFD166;
    font-size:34px;
    font-weight:600;
}

.year-pill{
    margin:20px auto 0 auto;
    width:max-content;
    padding:12px 30px;
    border-radius:40px;

    background:linear-gradient(90deg,
    rgba(37,99,235,0.9),
    rgba(124,58,237,0.9));

    color:white;
    font-size:24px;
    font-weight:500;

    box-shadow:0 0 20px rgba(124,58,237,0.4);
}

/* GRID */

.cards-container{
    margin-top:26px;

    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

/* CARD */

.card{
    height:102px;
    border-radius:24px;

    display:flex;
    align-items:center;

    position:relative;
    overflow:hidden;

    padding-left:125px;
    padding-right:25px;

    cursor:pointer;

    transition:0.35s ease;

    box-shadow:
    0 0 18px rgba(255,255,255,0.06),
    0 10px 24px rgba(0,0,0,0.3);

    border:1px solid rgba(255,255,255,0.08);
}

.card:hover{
    transform:translateY(-6px) scale(1.02);

    box-shadow:
    0 0 30px rgba(255,255,255,0.15),
    0 16px 30px rgba(0,0,0,0.4);
}

.card::before{
    content:'';
    position:absolute;

    width:130px;
    height:130px;

    left:-28px;

    border-radius:50%;

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(10px);
}

.card-icon{
    position:absolute;

    left:24px;

    width:68px;
    height:68px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:34px;

    z-index:2;

    background:rgba(255,255,255,0.14);

    box-shadow:0 0 18px rgba(255,255,255,0.15);
}

.card-content{
    position:relative;
    z-index:2;
}

.card-number{
    color:rgba(255,255,255,0.75);
    font-size:15px;
    font-weight:600;
    margin-bottom:2px;
}

.card-title{
    color:white;
    font-size:18px;
    font-weight:600;
    line-height:1.3;
}

.card-arrow{
    position:absolute;
    right:22px;

    color:rgba(255,255,255,0.8);

    font-size:34px;

    z-index:2;
}

/* MOBILE */

@media(max-width:992px){

    .cards-container{
        grid-template-columns:repeat(2,1fr);
    }

    .header-text h1{
        font-size:38px;
    }

}

@media(max-width:768px){

    body{
        padding:10px;
    }

    .header-flex{
        flex-direction:column;
    }

    .logo{
        width:80px;
        height:80px;
        font-size:32px;
    }

    .header-text h1{
        font-size:28px;
        line-height:1.3;
    }

    .header-text h2{
        font-size:22px;
    }

    .year-pill{
        font-size:16px;
        padding:10px 20px;
    }

    .cards-container{
        grid-template-columns:1fr;
        gap:14px;
    }

    .card{
        height:90px;
        padding-left:105px;
    }

    .card::before{
        width:110px;
        height:110px;
    }

    .card-icon{
        width:58px;
        height:58px;
        font-size:28px;
    }

    .card-title{
        font-size:16px;
    }

}

</style>
</head>
<body>

<div class="main-header">

    <div class="header-flex">

        <div class="logo">🎓</div>

        <div class="header-text">
            <h1>Mahatma Gandhi Institute of Technology</h1>
            <h2>Training and Placement Cell</h2>

            <div class="year-pill">
                📅 Academic Year 2025-2026
            </div>
        </div>

    </div>

</div>

<div class="cards-container" id="cardsContainer"></div>

<script>

const cardData = [

{

{

},

{

},

{

},

{

},

{
    title:"Cognizant",

},

{
    title:"Mail Confirmation of the Selected Students",

    color:"linear-gradient(135deg,#e11d48,#9f1239)",

},

{
    title:"IBM",

},

{

},

{

},

{
    title:"Oracle",

    color:"linear-gradient(135deg,#a855f7,#7e22ce)",
    page:"oracle.html"
},

{
    title:"Amazon",
    icon:"🛒",
    color:"linear-gradient(135deg,#0f766e,#115e59)",

},

{

    color:"linear-gradient(135deg,#f43f5e,#e11d48)",

},

{

},

},

{

    page:"hexaware.html"
},

{
    title:"Genpact",
    icon:"📁",
    color:"linear-gradient(135deg,#4b5563,#1f2937)",
    page:"genpact.html"
}

];

const container = document.getElementById('cardsContainer');

cardData.forEach((card,index)=>{

    const div = document.createElement('div');

    div.className='card';

    div.style.background = card.color;

    div.innerHTML = `

        <div class="card-icon">
            ${card.icon}
        </div>

        <div class="card-content">
            <div class="card-number">
                ${String(index+1).padStart(2,'0')}
            </div>

            <div class="card-title">
                ${card.title}
            </div>
        </div>

        <div class="card-arrow">
            ›
        </div>

    `;

    div.onclick = ()=>{
        window.location.href = card.page;
    }

    container.appendChild(div);

});

</script>

</body>
</html>
