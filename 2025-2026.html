<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2025-2026</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
    margin:0;
    padding:20px;
    font-family:Arial;
    background:#f2f5ff;
}

/* =========================
   HEADER CARD
========================= */

.main-header-card{
    width:100%;
    background:linear-gradient(135deg,#0B3D91,#2563EB);
    border-radius:22px;
    padding:20px 15px;
    text-align:center;
    box-sizing:border-box;
    box-shadow:0 8px 20px rgba(0,0,0,0.22);
    border:3px solid #082c6c;
    margin:0;
}

.title1{
    color:white;
    font-size:34px;
    font-weight:bold;
    margin-bottom:10px;
    letter-spacing:0.5px;
}

.title2{
    color:#E0E7FF;
    font-size:24px;
    font-weight:bold;
    margin-bottom:8px;
}

.title3{
    color:#C7D2FE;
    font-size:20px;
    font-weight:bold;
}

/* =========================
   REMOVE EXTRA SPACES
========================= */

body{
    margin:0;
    padding:10px;
    font-family:Arial;

    background:linear-gradient(
        135deg,
        #7C2D12 0%,
        #9A3412 25%,
        #C2410C 50%,
        #EA580C 75%,
        #FB923C 100%
    );

    min-height:100vh;
    background-attachment:fixed;
}


.cards-container{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin-top:25px;
}
.card{
    position:relative;
    height:60px;
    border-radius:18px;
    display:flex;
    align-items:center;
    overflow:hidden;
    cursor:pointer;
    transition:0.35s ease;
    box-shadow:0 8px 18px rgba(0,0,0,0.18);
    color:white;
    font-weight:bold;
    padding-left:85px;
    font-size:16px;
}

/* LEFT BIG CIRCLE */

.card::before{
    content:"";
    position:absolute;
    left:-28px;
    width:110px;
    height:110px;
    border-radius:50%;
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(6px);
}

/* ICON */

.card-icon{
    position:absolute;
    left:18px;
    width:52px;
    height:52px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:26px;
    z-index:2;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
}

/* CARD TEXT */

.card-text{
    z-index:2;
    padding-right:10px;
    line-height:1.3;
    letter-spacing:0.3px;
}

/* HOVER EFFECT */

.card:hover{
    transform:translateY(-5px) scale(1.02);
    box-shadow:0 14px 25px rgba(0,0,0,0.25);
}

/* MOBILE */

@media screen and (max-width:768px){

    .card{
        height:74px;
        padding-left:78px;
        font-size:15px;
    }

    .card::before{
        width:95px;
        height:95px;
        left:-24px;
    }

    .card-icon{
        width:46px;
        height:46px;
        font-size:22px;
        left:16px;
    }

}

    /* =========================
   MOBILE RESPONSIVE DESIGN
========================= */

@media screen and (max-width: 1024px){

    .cards-container{
        grid-template-columns:repeat(2,1fr);
    }

    h2{
        width:80%;
    }

    h3{
        width:60%;
    }

}

@media screen and (max-width: 768px){

    body{
        padding:12px;
    }

    h1{
        width:95%;
        font-size:24px;
        padding:14px;
        border-radius:14px;
    }

    h2{
        width:95%;
        font-size:20px;
        padding:12px;
        border-radius:12px;
    }

    h3{
        width:90%;
        font-size:18px;
        padding:10px;
        border-radius:10px;
    }

    .cards-container{
        grid-template-columns:1fr;
        gap:14px;
    }

    .card{
        height:70px;
        font-size:16px;
        border-radius:18px;
        padding:10px;
    }

    table{
        display:block;
        overflow-x:auto;
        white-space:nowrap;
        border-radius:10px;
    }

    th,td{
        padding:8px;
        font-size:14px;
    }

}

@media screen and (max-width: 480px){

    h1{
        font-size:20px;
    }

    h2{
        font-size:18px;
    }

    h3{
        font-size:16px;
    }

    .card{
        font-size:15px;
        height:65px;
    }

}

</style>
</head>

function loadCSV(url){

    if(url===""){
        alert("CSV Link Not Added");
        return;
    }

    document.getElementById("loading").innerHTML="Loading Data...";

    Papa.parse(url,{

        download:true,

        complete:function(results){

            let data=results.data;

            let tableHTML="";

            data.forEach((row,rowIndex)=>{

                tableHTML+="<tr>";

                row.forEach(cell=>{

                    if(rowIndex===0){
                        tableHTML+=`<th>${cell}</th>`;
                    }else{
                        tableHTML+=`<td>${cell}</td>`;
                    }

                });

                tableHTML+="</tr>";

            });

            document.getElementById("dataTable").innerHTML=tableHTML;

            document.getElementById("loading").innerHTML="";

        },

        error:function(){

            document.getElementById("loading").innerHTML="Unable to Load CSV Data";

        }

    });

}
