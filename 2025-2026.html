<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2025-2026</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
    margin:0;
    padding:20px;
    font-family:Arial;
    background:#ffffff;
    min-height:100vh;
    box-sizing:border-box;
}

/* =========================
   HEADER CARD
========================= */

.main-header-card{
    width:100%;
    background:linear-gradient(135deg,#0B3D91,#2563EB);
    border-radius:22px;
    padding:20px 15px;
    text-align:center;
    box-sizing:border-box;
    box-shadow:0 8px 20px rgba(0,0,0,0.22);
    border:3px solid #082c6c;
    margin:0;
}

.title1{
    color:white;
    font-size:34px;
    font-weight:bold;
    margin-bottom:10px;
    letter-spacing:0.5px;
}

.title2{
    color:#E0E7FF;
    font-size:24px;
    font-weight:bold;
    margin-bottom:8px;
}

.title3{
    color:#C7D2FE;
    font-size:20px;
    font-weight:bold;
}

/* =========================
   CARDS
========================= */

.cards-container{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin-top:25px;
}

.card{
    position:relative;
    height:60px;
    border-radius:18px;
    display:flex;
    align-items:center;
    overflow:hidden;
    cursor:pointer;
    transition:0.35s ease;
    box-shadow:0 8px 18px rgba(0,0,0,0.18);
    color:white;
    font-weight:bold;
    padding-left:85px;
    font-size:16px;
}

.card::before{
    content:"";
    position:absolute;
    left:-28px;
    width:110px;
    height:110px;
    border-radius:50%;
    background:rgba(255,255,255,0.18);
}

.card-icon{
    position:absolute;
    left:18px;
    width:52px;
    height:52px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:26px;
    z-index:2;
    background:rgba(255,255,255,0.15);
}

.card-text{
    z-index:2;
    padding-right:10px;
    line-height:1.3;
    letter-spacing:0.3px;
}

.card:hover{
    transform:translateY(-5px) scale(1.02);
}

/* TABLE */

table{
    width:100%;
    border-collapse:collapse;
    margin-top:25px;
    background:white;
}

th{
    background:#2563EB;
    color:white;
    padding:12px;
    border:1px solid #ddd;
}

td{
    padding:10px;
    border:1px solid #ddd;
}

.loading{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
    color:#2563EB;
}

/* MOBILE */

@media screen and (max-width:768px){

    .cards-container{
        grid-template-columns:1fr;
    }

    table{
        display:block;
        overflow-x:auto;
        white-space:nowrap;
    }

}

</style>
</head>

<body>

<div class="main-header-card">

    <div class="title1">
        Mahatma Gandhi Institute of Technology
    </div>

    <div class="title2">
        Training and Placement Cell
    </div>

    <div class="title3">
        Academic Year 2025-2026
    </div>

</div>

<div class="cards-container" id="cardsContainer"></div>

<div class="loading" id="loading"></div>

<table id="dataTable"></table>

<script>

const csvLinks = {

A:"https://docs.google.com/spreadsheets/d/e/2PACX-1vSFxqsJB3rQHXWjpl3ofrPYtZ8ljCKJRVwhzwD0aWDz19Waec_2gXp2YpHMa4g72MA7BIBvdVEAF_fg/pub?gid=1145740463&single=true&output=csv",

B:"",
C:"",
D:"",
E:"",
F:"",
G:"",
H:"",
I:"",
J:"",
K:"",
L:"",
M:"",
N:"",
O:"",
P:"",
Q:"",
R:""

};

const colors = [

"#1E3A8A",
"#7C3AED",
"#DC2626",
"#059669",
"#EA580C",
"#0891B2",
"#BE123C",
"#4F46E5",
"#15803D",
"#B45309",
"#9333EA",
"#0F766E",
"#E11D48",
"#2563EB",
"#65A30D",
"#C2410C",
"#4338CA",
"#374151"

];

const container = document.getElementById("cardsContainer");

const icons = {

A:"📘",
B:"🎓",
C:"💼",
D:"📄",
E:"🏢",
F:"🧠",
G:"📧",
H:"🌐",
I:"💻",
J:"📊",
K:"🗄️",
L:"🛒",
M:"📈",
N:"🪟",
O:"🚗",
P:"📝",
Q:"⚡",
R:"📁"

};

Object.keys(csvLinks).forEach((key,index)=>{

    const card=document.createElement("div");

    card.className="card";

    card.style.background=colors[index];

    const cardNames = {

        A:"Master Students Data",
        B:"HR-Contct Details",
        C:"-",
        D:"Placed Students Data with Offer Letters",
        E:"Department wise Company Details",
        F:"Salry Details",
        G:"Mail Confirmation of the Selected Students",
        H:"-",
        I:"Nature of Offers Details (Core/IT)",
        J:"Placement Report",
        K:"Internship Details",
        L:"Circulars",
        M:"Placement Progression",
        N:"Drives & Their Photos",
        O:"Student Interaction & Training Programs with Profs",
        P:"All Students Registrations",
        Q:"Staff Attendance Details",
        R:"NBA & NIRF Shared Data"

    };

    card.innerHTML = `

    <div class="card-icon">
        ${icons[key]}
    </div>

    <div class="card-text">
        ${cardNames[key]}
    </div>

    `;

    card.onclick = () => {

        if(csvLinks[key] === ""){
            alert("CSV Link Not Added");
            return;
        }

        loadCSV(csvLinks[key]);

    };

    container.appendChild(card);

});

function loadCSV(url){

    document.getElementById("loading").innerHTML="Loading Data...";

    Papa.parse(url,{

        download:true,

        complete:function(results){

            let data=results.data;

            let tableHTML="";

            data.forEach((row,rowIndex)=>{

                tableHTML+="<tr>";

                row.forEach(cell=>{

                    if(rowIndex===0){
                        tableHTML+=`<th>${cell}</th>`;
                    }else{
                        tableHTML+=`<td>${cell}</td>`;
                    }

                });

                tableHTML+="</tr>";

            });

            document.getElementById("dataTable").innerHTML=tableHTML;

            document.getElementById("loading").innerHTML="";

        },

        error:function(){

            document.getElementById("loading").innerHTML="Unable to Load CSV Data";

        }

    });

}

</script>

</body>
</html>
