<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Google Sheet Table</title>

<!-- Papa Parse Library -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
    margin:0;
    padding:20px;
    font-family:Arial, sans-serif;
    background:#f4f7ff;
}

/* Heading */
.heading{
    text-align:center;
    font-size:32px;
    font-weight:bold;
    color:#0b3d91;
    margin-bottom:25px;
}

    <div class="filters">

    <input 
        type="text" 
        id="searchInput" 
        placeholder="Search Data..."
        onkeyup="searchTable()"
    >

    <select id="batchFilter" onchange="filterBatch()">
        <option value="">All Batches</option>
    </select>

</div>

/* Table */
table{
    width:100%;
    margin-top:25px;
    border-collapse:collapse;
    background:white;
    border:3px solid #0b3d91;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

th,td{
    border:2px solid #555;
    padding:12px;
    text-align:center;
    font-size:15px;
}

th{
    background:#0b3d91;
    color:white;
    font-weight:bold;
}

tr:nth-child(even){
    background:#f2f5ff;
}

tr:hover{
    background:#dbeafe;
    transition:0.3s;
}
/* Loading Text */
.loading{
    text-align:center;
    font-size:20px;
    color:#0b3d91;
    margin-top:20px;
}

@media(max-width:768px){

    body{
        padding:10px;
    }

    .heading{
        font-size:24px;
    }

    table{
}

th,td{
}

th{
}

}
    .filters{
    display:flex;
    gap:15px;
    margin-top:20px;
    margin-bottom:15px;
    flex-wrap:wrap;
}

#searchInput,
#batchFilter{
    padding:12px 15px;
    border:2px solid #0b3d91;
    border-radius:10px;
    font-size:15px;
    outline:none;
    background:white;
}

#searchInput{
    width:280px;
}

#batchFilter{
    width:180px;
}

</style>
</head>

<body>

<div class="heading">
    HR Contact Details for the AY 2025-2026
</div>

<div class="loading" id="loading">
    Loading Data...
</div>

<table id="dataTable"></table>

<script>

/* ===========================
   ADD YOUR GOOGLE SHEET CSV LINK HERE
=========================== */

const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSb-y0j0bmZw_m5r33iFrUg_mjVdy4QT7lTaHJPxgijcb2_gW2uFc6hdlS77pCI0g/pub?gid=1067544906&single=true&output=csv";

/* ===========================
   LOAD CSV DATA
=========================== */

Papa.parse(csvURL,{

    download:true,

    complete:function(results){

        let data = results.data;
        populateBatchFilter(data);

        let tableHTML = "";

        data.forEach((row,rowIndex)=>{

            tableHTML += "<tr>";

            row.forEach(cell=>{

                if(rowIndex === 0){

                    tableHTML += `<th>${cell}</th>`;

                }else{

                    tableHTML += `<td>${cell}</td>`;

                }

            });

            tableHTML += "</tr>";

        });

        document.getElementById("dataTable").innerHTML = tableHTML;

        document.getElementById("loading").style.display = "none";

    },

    error:function(){

        document.getElementById("loading").innerHTML = "Unable to Load Data";

    }

});
    function searchTable(){

    let input = document.getElementById("searchInput").value.toLowerCase();

    let rows = document.querySelectorAll("#dataTable tr");

    rows.forEach((row,index)=>{

        if(index===0) return;

        let text = row.innerText.toLowerCase();

        row.style.display = text.includes(input) ? "" : "none";

    });

}

function populateBatchFilter(data){

    let batchSelect = document.getElementById("batchFilter");

    let batches = new Set();

    data.slice(1).forEach(row=>{

        if(row[0]){
            batches.add(row[0]);
        }

    });

    batches.forEach(batch=>{

        let option=document.createElement("option");

        option.value=batch;

        option.textContent=batch;

        batchSelect.appendChild(option);

    });

}

function filterBatch(){

    let selected = document.getElementById("batchFilter").value.toLowerCase();

    let rows = document.querySelectorAll("#dataTable tr");

    rows.forEach((row,index)=>{

        if(index===0) return;

        let firstCell = row.cells[0]?.innerText.toLowerCase() || "";

        if(selected===""){
            row.style.display="";
        }
        else{
            row.style.display = firstCell===selected ? "" : "none";
        }

    });

}

</script>

</body>
</html>
