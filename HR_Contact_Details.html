<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MGIT Header</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    background:
    linear-gradient(
        135deg,
        #0F172A 0%,
        #1E1B4B 40%,
        #312E81 70%,
        #4C1D95 100%
    );

    padding:15px;
}

/* =========================
   HEADER CARD
========================= */

.header-card{

    width:100%;

    max-width:1400px;

    margin:auto;

    border-radius:28px;

    overflow:hidden;

    box-shadow:
    0 15px 40px rgba(0,0,0,0.35);

    animation:fadeIn 1s ease;

}

/* =========================
   HEADER IMAGE
========================= */

.header-image{

    width:100%;

    display:block;

    object-fit:cover;

}

/* =========================
   HOVER EFFECT
========================= */

.header-card:hover{

    transform:translateY(-3px);

    transition:0.4s ease;

}

/* =========================
   ANIMATION
========================= */

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

/* =========================
   MOBILE RESPONSIVE
========================= */

@media(max-width:768px){

    body{
        padding:8px;
    }

    .header-card{

        border-radius:18px;

    }

}

</style>
</head>

<body>

<div class="header-card">

    <img src="header.jpg" class="header-image" alt="Header Image">

</div>

</body>
</html>
