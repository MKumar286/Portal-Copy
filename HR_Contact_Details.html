<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MGIT Header</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      overflow-x: hidden;
      background: #ffffff;
    }

    .header-container {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .header-image {
      width: 100%;
      height: auto;
      display: block;

      /* Shows full image without cutting */
      object-fit: contain;

      /* Keeps original design exactly */
      max-width: 100%;
    }

    /* Optional: slightly compress height on mobile */
    @media screen and (max-width: 768px) {
      .header-image {
        width: 100%;
        height: auto;
      }
    }
  </style>
</head>

<body>

  <div class="header-container">
    <img src="header.png" alt="MGIT Header" class="header-image">
  </div>

</body>
</html>
