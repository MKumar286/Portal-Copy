<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MGIT Header</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:
    linear-gradient(
        135deg,
        #0f172a,
        #1e1b4b,
        #312e81
    );

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:flex-start;

    padding:10px;

    overflow-x:hidden;
}

/* =========================
   HEADER CONTAINER
========================= */

.header-container{

    width:100%;

    max-width:1400px;

    border-radius:22px;

    overflow:hidden;

    box-shadow:
    0 10px 35px rgba(0,0,0,0.40);

    animation:fadeIn 1s ease;

}

/* =========================
   HEADER IMAGE
========================= */

.header-image{

    width:100%;

    height:260px;

    display:block;

    object-fit:contain;

}

/* =========================
   HOVER EFFECT
========================= */

.header-container:hover{

    transform:translateY(-3px);

    transition:0.4s ease;

}

/* =========================
   ANIMATION
========================= */

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

/* =========================
   MOBILE RESPONSIVE
========================= */

@media(max-width:768px){

    body{

        padding:5px;

    }

    .header-container{

        border-radius:16px;

    }

    .header-image{

        width:100%;

        height:150px;

        object-fit:contain;

    }

}

</style>
</head>

<body>

<div class="header-container">

    <img src="header.png" class="header-image" alt="MGIT Header">

</div>

</body>
</html>
