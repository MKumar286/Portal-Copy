<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HR Contact Details 2025-2026</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;

    background:
    linear-gradient(
        135deg,
        #0F172A 0%,
        #1E1B4B 40%,
        #312E81 70%,
        #4C1D95 100%
    );

    display:flex;
    justify-content:center;
    align-items:flex-start;

    padding:20px;
}

/* =========================
   HEADER CARD
========================= */

.header-card{

    width:100%;
    max-width:1400px;

    background:
    linear-gradient(
        135deg,
        rgba(37,99,235,0.95),
        rgba(79,70,229,0.95),
        rgba(124,58,237,0.95)
    );

    border-radius:28px;

    padding:28px 35px;

    text-align:center;

    position:relative;

    overflow:hidden;

    box-shadow:
    0 12px 30px rgba(0,0,0,0.30),
    inset 0 1px 0 rgba(255,255,255,0.15);

    border:1px solid rgba(255,255,255,0.12);

    backdrop-filter:blur(12px);

    animation:fadeIn 1s ease;
}

/* Glow Effect */

.header-card::before{

    content:"";

    position:absolute;

    top:-120px;
    left:-120px;

    width:280px;
    height:280px;

    border-radius:50%;

    background:rgba(255,255,255,0.08);

}

.header-card::after{

    content:"";

    position:absolute;

    bottom:-120px;
    right:-120px;

    width:300px;
    height:300px;

    border-radius:50%;

    background:rgba(255,255,255,0.06);

}

/* =========================
   MAIN HEADING
========================= */

.main-heading{

    position:relative;
    z-index:2;

    color:white;

    font-size:42px;

    font-weight:700;

    letter-spacing:0.5px;

    text-shadow:0 3px 10px rgba(0,0,0,0.25);

}

/* =========================
   SUB HEADING
========================= */

.sub-heading{

    position:relative;
    z-index:2;

    margin-top:10px;

    color:#E0E7FF;

    font-size:28px;

    font-weight:600;

    letter-spacing:0.3px;

}

/* =========================
   YEAR HEADING
========================= */

.year-heading{

    position:relative;
    z-index:2;

    margin-top:8px;

    color:#C7D2FE;

    font-size:20px;

    font-weight:500;

    letter-spacing:0.3px;

}

/* =========================
   HOVER EFFECT
========================= */

.header-card:hover{

    transform:translateY(-3px);

    transition:0.4s ease;

    box-shadow:
    0 18px 40px rgba(0,0,0,0.35),
    inset 0 1px 0 rgba(255,255,255,0.15);

}

/* =========================
   ANIMATION
========================= */

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

/* =========================
   MOBILE RESPONSIVE
========================= */

@media(max-width:768px){

    body{
        padding:10px;
    }

    .header-card{

        padding:20px 15px;

        border-radius:22px;

    }

    .main-heading{

        font-size:24px;

        line-height:1.4;

    }

    .sub-heading{

        font-size:18px;

        margin-top:6px;

    }

    .year-heading{

        font-size:14px;

        margin-top:5px;

        line-height:1.4;

    }

}
    .header-image{
    width:100%;
    border-radius:20px;
    display:block;
}

</style>
</head>

<body>

<div class="header-card">

    <img src="header.jpg" alt="MGIT Header" class="header-image">

</div>
</body>
</html>
