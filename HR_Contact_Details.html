<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HR Contact Details</title>

<!-- Papa Parse Library -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f4f7ff;
    padding:20px;
}

/* =========================
   HEADING
========================= */

.heading{
    text-align:center;
    font-size:32px;
    font-weight:bold;
    color:#0b3d91;
    margin-bottom:25px;
}

/* =========================
   FILTERS
========================= */

#filters{
    display:flex;
    gap:15px;
    margin-bottom:20px;
    flex-wrap:wrap;
    align-items:center;
}

#searchInput,
#batchFilter{

    padding:12px 15px;
    border:2px solid #0b3d91;
    border-radius:10px;
    font-size:15px;
    outline:none;
    background:white;
}

#searchInput{
    width:300px;
}

#batchFilter{
    width:220px;
}

/* =========================
   TABLE
========================= */

.table-container{
    overflow:auto;
    max-height:80vh;
    border-radius:10px;
}

table{

    width:max-content;
    min-width:100%;

    border-collapse:collapse;

    background:white;

    border:3px solid #0b3d91;

    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

th,td{

    border:1px solid #555;

    padding:4px 8px;

    text-align:center;

    font-size:12px;

    white-space:nowrap;

    overflow:hidden;

    text-overflow:ellipsis;

    line-height:1;

    height:28px;
}

/* AUTO WIDTH BASED ON CONTENT */

table{
    table-layout:auto;
}

td{
    max-width:250px;
}
/* HEADER */

th{

    background:#0b3d91;

    color:white;

    font-weight:bold;

    position:sticky;

    top:0;

    z-index:2;
}

/* ROW COLORS */

tr:nth-child(even){
    background:#f2f5ff;
}

tr:hover{
    background:#dbeafe;
    transition:0.3s;
}

/* =========================
   LOADING
========================= */

.loading{

    text-align:center;

    font-size:20px;

    color:#0b3d91;

    margin-bottom:20px;
}

/* =========================
   MOBILE RESPONSIVE
========================= */

@media(max-width:768px){

    body{
        padding:10px;
    }

    .heading{
        font-size:22px;
        line-height:1.4;
    }

    #filters{
        flex-direction:column;
        align-items:stretch;
    }

    #searchInput,
    #batchFilter{
        width:100%;
    }

    th,td{
        font-size:12px;
        padding:8px 10px;
    }

}

</style>

</head>

<body>

<div class="heading">
    HR Contact Details for the AY 2025-2026
</div>

<div id="filters"></div>

<div class="loading" id="loading">
    Loading Data...
</div>

<div class="table-container">
    <table id="dataTable"></table>
</div>

<script>

/* =====================================
   PASTE YOUR GOOGLE SHEET CSV LINK HERE
===================================== */

const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSb-y0j0bmZw_m5r33iFrUg_mjVdy4QT7lTaHJPxgijcb2_gW2uFc6hdlS77pCI0g/pub?gid=1067544906&single=true&output=csv";

/* =====================================
   LOAD CSV
===================================== */

function loadCSV(){

    document.getElementById("loading").innerHTML =
    "Loading Data...";

    Papa.parse(csvURL,{

        download:true,

        skipEmptyLines:true,

        complete:function(results){

            const data = results.data;

            if(data.length === 0){

                document.getElementById("loading").innerHTML =
                "No Data Found";

                return;
            }

            createFilters(data);

            createTable(data);

            document.getElementById("loading").innerHTML = "";

        },

        error:function(error){

            console.log(error);

            document.getElementById("loading").innerHTML =
            "Unable to Load Data";

        }

    });

}

/* =====================================
   CREATE FILTERS
===================================== */

function createFilters(data){

    const filterDiv =
    document.getElementById("filters");

    const headers = data[0];

    const batchIndex =
    headers.findIndex(h =>
        h.toLowerCase().includes("batch")
    );

    let batches = [];

    if(batchIndex !== -1){

        batches = [...new Set(

            data.slice(1).map(
                row => row[batchIndex]
            )

        )];

    }

    filterDiv.innerHTML = `

    <input
        type="text"
        id="searchInput"
        placeholder="Search Data..."
        onkeyup="filterTable()"
    >

    <select
        id="batchFilter"
        onchange="filterTable()"
    >

        <option value="">
            All Batches
        </option>

        ${batches.map(batch =>

            `<option value="${batch}">
                ${batch}
            </option>`

        ).join("")}

    </select>

    `;

}

/* =====================================
   CREATE TABLE
===================================== */

function createTable(data){

    let tableHTML = "";

    data.forEach((row,rowIndex)=>{

        tableHTML += "<tr>";

        row.forEach(cell=>{

            if(rowIndex===0){

                tableHTML += `<th>${cell}</th>`;

            }else{

                tableHTML += `<td>${cell}</td>`;

            }

        });

        tableHTML += "</tr>";

    });

    document.getElementById("dataTable").innerHTML =
    tableHTML;

}

/* =====================================
   FILTER TABLE
===================================== */

function filterTable(){

    const search =

    document.getElementById("searchInput")
    .value
    .toLowerCase();

    const batch =

    document.getElementById("batchFilter")
    .value
    .toLowerCase();

    const table =
    document.getElementById("dataTable");

    const tr =
    table.getElementsByTagName("tr");

    for(let i=1;i<tr.length;i++){

        const rowText =
        tr[i].innerText.toLowerCase();

        const searchMatch =
        rowText.includes(search);

        const batchMatch =

        batch === "" ||
        rowText.includes(batch);

        if(searchMatch && batchMatch){

            tr[i].style.display = "";

        }else{

            tr[i].style.display = "none";

        }

    }

}

/* =====================================
   LOAD PAGE
===================================== */

window.onload = loadCSV;

</script>

</body>
</html>
