<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Google Sheet Table</title>

<!-- Papa Parse Library -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
    margin:0;
    padding:20px;
    font-family:Arial, sans-serif;
    background:#f4f7ff;
}

/* Heading */
.heading{
    text-align:center;
    font-size:32px;
    font-weight:bold;
    color:#0b3d91;
    margin-bottom:25px;
}

/* Table */
table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

th{
    background:#0b3d91;
    color:white;
    padding:14px;
    font-size:16px;
}

td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

tr:hover{
    background:#f1f5ff;
}

/* Loading Text */
.loading{
    text-align:center;
    font-size:20px;
    color:#0b3d91;
    margin-top:20px;
}

@media(max-width:768px){

    body{
        padding:10px;
    }

    .heading{
        font-size:24px;
    }

    table{
        font-size:13px;
    }

    th,td{
        padding:8px;
    }

}

</style>
</head>

<body>

<div class="heading">
    HR Contact Details for the AY 2025-2026
</div>

<div class="loading" id="loading">
    Loading Data...
</div>

<table id="dataTable"></table>

<script>

/* ===========================
   ADD YOUR GOOGLE SHEET CSV LINK HERE
=========================== */

const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSb-y0j0bmZw_m5r33iFrUg_mjVdy4QT7lTaHJPxgijcb2_gW2uFc6hdlS77pCI0g/pub?gid=1067544906&single=true&output=csv";

/* ===========================
   LOAD CSV DATA
=========================== */

Papa.parse(csvURL,{

    download:true,

    complete:function(results){

        let data = results.data;

        let tableHTML = "";

        data.forEach((row,rowIndex)=>{

            tableHTML += "<tr>";

            row.forEach(cell=>{

                if(rowIndex === 0){

                    tableHTML += `<th>${cell}</th>`;

                }else{

                    tableHTML += `<td>${cell}</td>`;

                }

            });

            tableHTML += "</tr>";

        });

        document.getElementById("dataTable").innerHTML = tableHTML;

        document.getElementById("loading").style.display = "none";

    },

    error:function(){

        document.getElementById("loading").innerHTML = "Unable to Load Data";

    }

});

</script>

</body>
</html>
