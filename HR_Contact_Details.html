<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Google Sheet Table</title>

<!-- Papa Parse Library -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
    margin:0;
    padding:20px;
    font-family:Arial, sans-serif;
    background:#f4f7ff;
}

/* Heading */
.heading{
    text-align:center;
    font-size:32px;
    font-weight:bold;
    color:#0b3d91;
    margin-bottom:25px;
}

    <div class="filters">

    <input 
        type="text" 
        id="searchInput" 
        placeholder="Search Data..."
        onkeyup="searchTable()"
    >

    <select id="batchFilter" onchange="filterBatch()">
        <option value="">All Batches</option>
    </select>

</div>

<div id="filters"></div>

<div class="table-container">
    <table id="dataTable"></table>
</div>

<div id="loading"></div>    

/* Table */
table{
    width:100%;
    margin-top:25px;
    border-collapse:collapse;
    background:white;
    border:3px solid #0b3d91;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

th,td{
    border:2px solid #555;
    padding:12px;
    text-align:center;
    font-size:15px;
}

th{
    background:#0b3d91;
    color:white;
    font-weight:bold;
}

tr:nth-child(even){
    background:#f2f5ff;
}

tr:hover{
    background:#dbeafe;
    transition:0.3s;
}
/* Loading Text */
.loading{
    text-align:center;
    font-size:20px;
    color:#0b3d91;
    margin-top:20px;
}

@media(max-width:768px){

    body{
        padding:10px;
    }

    .heading{
        font-size:24px;
    }

    table{
}

th,td{
}

th{
}

}
    .filters{
    display:flex;
    gap:15px;
    margin-top:20px;
    margin-bottom:15px;
    flex-wrap:wrap;
}

#searchInput,
#batchFilter{
    padding:12px 15px;
    border:2px solid #0b3d91;
    border-radius:10px;
    font-size:15px;
    outline:none;
    background:white;
}

#searchInput{
    width:280px;
}

#batchFilter{
    width:180px;
}

 #filters{
    margin:20px 0;
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

#searchInput,
#batchFilter{
    padding:10px 15px;
    font-size:16px;
    border:2px solid #0b3d91;
    border-radius:8px;
}

.table-container{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th{
    background:#0b3d91;
    color:white;
    border:2px solid #000;
    padding:10px;
}

td{
    border:1px solid #000;
    padding:10px;
    text-align:center;
}

tr:nth-child(even){
    background:#f5f5f5;
}

.loading{
    margin-top:20px;
    font-size:20px;
    color:#0b3d91;
}   

</style>
</head>

<body>

<div class="heading">
    HR Contact Details for the AY 2025-2026
</div>

<div class="loading" id="loading">
    Loading Data...
</div>

<table id="dataTable"></table>
<script>

const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSb-y0j0bmZw_m5r33iFrUg_mjVdy4QT7lTaHJPxgijcb2_gW2uFc6hdlS77pCI0g/pub?gid=1067544906&single=true&output=csv";

function loadCSV() {

    document.getElementById("loading").innerHTML = "Loading Data...";

    Papa.parse(csvURL, {

        download: true,
        skipEmptyLines: true,

        complete: function(results) {

            const data = results.data;

            if(data.length === 0){
                document.getElementById("loading").innerHTML = "No Data Found";
                return;
            }

            createFilters(data);

            createTable(data);

            document.getElementById("loading").innerHTML = "";

        },

        error: function(error) {

            console.log(error);

            document.getElementById("loading").innerHTML =
            "Unable to Load Data";

        }

    });

}

function createFilters(data){

    const filterDiv = document.getElementById("filters");

    const headers = data[0];

    const batchIndex = headers.findIndex(h =>
        h.toLowerCase().includes("batch")
    );

    let batches = [];

    if(batchIndex !== -1){

        batches = [...new Set(
            data.slice(1).map(row => row[batchIndex])
        )];

    }

    filterDiv.innerHTML = `

    <input
        type="text"
        id="searchInput"
        placeholder="Search Data..."
        onkeyup="filterTable()"
    >

    <select id="batchFilter" onchange="filterTable()">

        <option value="">All Batches</option>

        ${batches.map(batch =>
            `<option value="${batch}">${batch}</option>`
        ).join("")}

    </select>

    `;

}

function createTable(data){

    let tableHTML = "";

    data.forEach((row, rowIndex) => {

        tableHTML += "<tr>";

        row.forEach(cell => {

            if(rowIndex === 0){

                tableHTML += `<th>${cell}</th>`;

            } else {

                tableHTML += `<td>${cell}</td>`;

            }

        });

        tableHTML += "</tr>";

    });

    document.getElementById("dataTable").innerHTML = tableHTML;

}

function filterTable(){

    const search =
    document.getElementById("searchInput").value.toLowerCase();

    const batch =
    document.getElementById("batchFilter").value.toLowerCase();

    const table =
    document.getElementById("dataTable");

    const tr = table.getElementsByTagName("tr");

    for(let i = 1; i < tr.length; i++){

        const rowText =
        tr[i].innerText.toLowerCase();

        const rowHTML =
        tr[i].innerHTML.toLowerCase();

        const searchMatch =
        rowText.includes(search);

        const batchMatch =
        batch === "" || rowHTML.includes(batch);

        if(searchMatch && batchMatch){

            tr[i].style.display = "";

        } else {

            tr[i].style.display = "none";

        }

    }

}

window.onload = loadCSV;

</script>

</body>
</html>
