<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MGIT Header Design</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Poppins',sans-serif;

    min-height:100vh;

    background:
    linear-gradient(
        135deg,
        #0B1026,
        #161A45,
        #1D1F5C
    );

    display:flex;

    justify-content:center;

    align-items:flex-start;

    padding:15px;
}

/* =========================
   HEADER CONTAINER
========================= */

.header-card{

    width:100%;

    max-width:1600px;

    min-height:220px;

    position:relative;

    overflow:hidden;

    border-radius:30px;

    background:
    linear-gradient(
        135deg,
        #F8F5EF 0%,
        #FFFDF9 40%,
        #F3EEE5 100%
    );

    box-shadow:
    0 15px 40px rgba(0,0,0,0.35);

}

/* =========================
   LEFT BLUE SECTION
========================= */

.left-panel{

    position:absolute;

    left:0;
    top:0;

    width:24%;
    height:100%;

    background:
    linear-gradient(
        180deg,
        #001B4F,
        #002766,
        #00163D
    );

    border-top-right-radius:180px;
    border-bottom-right-radius:180px;

    border-right:8px solid #D4A64A;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;
}

/* Decorative dots */

.left-panel::before{

    content:"";

    position:absolute;

    top:20px;
    left:20px;

    width:120px;
    height:120px;

    background-image:radial-gradient(#CDA349 2px, transparent 2px);

    background-size:16px 16px;

    opacity:0.4;
}

/* =========================
   LOGO CIRCLE
========================= */

.logo-circle{

    width:120px;
    height:120px;

    border:4px solid #D4A64A;

    border-radius:50%;

    display:flex;

    justify-content:center;

    align-items:center;

    background:rgba(255,255,255,0.03);

    backdrop-filter:blur(4px);

    box-shadow:
    0 0 20px rgba(212,166,74,0.3);
}

.logo-circle img{

    width:90px;
    height:90px;

    object-fit:contain;
}

/* =========================
   MAIN CONTENT
========================= */

.content{

    position:relative;

    z-index:2;

    width:100%;

    padding:25px 40px 60px 220px;

    text-align:center;
}

/* =========================
   TOP GOLD LINE
========================= */

.top-line{

    width:180px;
    height:3px;

    background:#C69433;

    margin:0 auto 10px auto;

    border-radius:10px;
}

/* =========================
   MAIN TITLE
========================= */

.main-title{

    font-family:'Cinzel',serif;

    font-size:46px;

    font-weight:700;

    line-height:1.15;

    color:#08285D;

    text-shadow:
    0 2px 3px rgba(0,0,0,0.08);
}

/* =========================
   DIVIDER
========================= */

.divider{

    width:320px;
    height:2px;

    background:
    linear-gradient(
        to right,
        transparent,
        #C69433,
        transparent
    );

    margin:12px auto;
}

/* =========================
   SUB TITLE
========================= */

.sub-title{

    font-family:'Cinzel',serif;

    font-size:28px;

    font-weight:700;

    color:#A36816;

    margin-top:5px;
}

/* =========================
   HR TEXT
========================= */

.hr-text{

    font-size:18px;

    font-weight:600;

    color:#0A2B60;

    margin-top:10px;

    letter-spacing:0.3px;
}

/* =========================
   PEOPLE CIRCLE
========================= */

.people-circle{

    position:absolute;

    right:40px;
    top:50%;

    transform:translateY(-50%);

    width:140px;
    height:140px;

    border:5px solid #D4A64A;

    border-radius:50%;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

    background:white;

    box-shadow:
    0 0 20px rgba(212,166,74,0.35);
}

.people-circle img{

    width:100%;
    height:100%;

    object-fit:cover;
}

/* =========================
   BOTTOM WAVE
========================= */

.bottom-wave{

    position:absolute;

    bottom:0;
    left:0;

    width:100%;
    height:70px;

    background:
    linear-gradient(
        180deg,
        transparent,
        #001C52
    );

    clip-path:ellipse(70% 100% at 50% 100%);
}

/* =========================
   MOBILE RESPONSIVE
========================= */

@media(max-width:900px){

    .header-card{

        min-height:auto;
    }

    .left-panel{

        width:100%;

        height:90px;

        border-radius:0 0 60px 60px;

        border-right:none;

        border-bottom:5px solid #D4A64A;
    }

    .logo-circle{

        width:75px;
        height:75px;
    }

    .logo-circle img{

        width:55px;
        height:55px;
    }

    .content{

        padding:110px 20px 50px 20px;
    }

    .main-title{

        font-size:24px;
    }

    .sub-title{

        font-size:18px;
    }

    .hr-text{

        font-size:13px;

        line-height:1.5;
    }

    .divider{

        width:180px;
    }

    .people-circle{

        position:relative;

        right:auto;
        top:auto;

        transform:none;

        margin:20px auto 0 auto;

        width:90px;
        height:90px;
    }

    .bottom-wave{

        height:45px;
    }
}

</style>
</head>

<body>

<div class="header-card">

    <!-- LEFT PANEL -->

    <div class="left-panel">

        <div class="logo-circle">

            <!-- Replace logo.png with your logo image -->

            <img src="logo.png" alt="MGIT Logo">

        </div>

    </div>

    <!-- MAIN CONTENT -->

    <div class="content">

        <div class="top-line"></div>

        <div class="main-title">
            Mahatma Gandhi <br>
            Institute of Technology (A)
        </div>

        <div class="divider"></div>

        <div class="sub-title">
            Training & Placement Cell
        </div>

        <div class="divider"></div>

        <div class="hr-text">
            HR Contact Details for the Academic Year 2025-2026
        </div>

    </div>

    <!-- RIGHT PEOPLE IMAGE -->

    <div class="people-circle">

        <!-- Replace people.png with your image -->

        <img src="people.png" alt="People">

    </div>

    <!-- BOTTOM WAVE -->

    <div class="bottom-wave"></div>

</div>

</body>
</html>
