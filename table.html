<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CSV Data</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
    margin:0;
    padding:20px;
    font-family:Arial;
    background:#f5f7ff;
}

h1{
    text-align:center;
    color:#0b3d91;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    margin-top:20px;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

th{
    background:#0b3d91;
    color:white;
}

.loading{
    text-align:center;
    font-size:22px;
    color:#0b3d91;
    margin-top:30px;
}

.back-btn{
    padding:10px 20px;
    background:#0b3d91;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-bottom:20px;
}

</style>
</head>

<body>

<button class="back-btn" onclick="history.back()">← Back</button>

<h1>Student Data</h1>

<div class="loading" id="loading">
Loading Data...
</div>

<table id="dataTable"></table>

<script>

const csvURL = localStorage.getItem("csvURL");

Papa.parse(csvURL, {

    download: true,

    complete: function(results){

        let data = results.data;

        let tableHTML = "";

        data.forEach((row, rowIndex)=>{

            tableHTML += "<tr>";

            row.forEach(cell=>{

                if(rowIndex === 0){
                    tableHTML += `<th>${cell}</th>`;
                }else{
                    tableHTML += `<td>${cell}</td>`;
                }

            });

            tableHTML += "</tr>";

        });

        document.getElementById("dataTable").innerHTML = tableHTML;

        document.getElementById("loading").style.display = "none";

    },

    error: function(){

        document.getElementById("loading").innerHTML =
        "Unable to Load CSV Data";

    }

});

</script>

</body>
</html>
