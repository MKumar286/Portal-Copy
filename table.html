<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Data Table</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial;
   background:#f5f7ff;
    align-items:stretch;
    display:flex;
    flex-direction:column;

    overflow-x:hidden;
}

  

/* HEADER */

.header{
    width:100%;
    box-sizing:border-box;
    margin:2px auto;
    padding:10px;
    border-radius:20px;
    text-align:center;

    background:
        linear-gradient(
        135deg,
        #0b1f4d,
        #102a72,
        #163b8c,
        #1e4fa3
);

    box-shadow:
    0 8px 24px rgba(0,0,0,0.25),
    inset 0 0 12px rgba(255,255,255,0.08);
}

.header h1{
    margin:0;
    color:white;
    font-size:24px;
    text-transform:uppercase;
    letter-spacing:1px;
}

.header h2{
    margin-top:4px;
    font-size:24px;
    color:#f5f7ff;
    font-weight:600;
}

/* CARDS */

.cards-container{

    width:100%;

    margin:3px 0;

    display:flex;

    flex-wrap:wrap;

    gap:6px;

    justify-content:flex-start;

    align-items:center;
}

.card{

    min-width:140px;

    max-width:160px;

    padding:4px 8px;

    border-radius:14px;

    text-align:center;

    color:white;

    min-height:55px;

    display:flex;

    flex-direction:column;

    justify-content:center;

    box-shadow:
        0 3px 8px rgba(0,0,0,0.12);

    transition:0.3s;
}

/* TOTAL STUDENTS */

.card:nth-child(1){

    background:
    linear-gradient(
    135deg,
    #1565c0,
    #42a5f5
    );
}

/* REGISTERED */

.card:nth-child(2){

    background:
    linear-gradient(
    135deg,
    #00897b,
    #26c6da
    );
}

/* ELIGIBLE */

.card:nth-child(3){

    background:
    linear-gradient(
    135deg,
    #ef6c00,
    #ffb74d
    );
}

/* PLACED */

.card:nth-child(4){

    background:
    linear-gradient(
    135deg,
    #6a1b9a,
    #ab47bc
    );
}

/* OFFERS */

.card:nth-child(5){

    background:
    linear-gradient(
    135deg,
    #c62828,
    #ef5350
    );
}
    
.card:hover{
    transform:translateY(-5px);
}

.card h3{

    margin:0;

    font-size:13px;

    line-height:16px;

    color:white;

    font-weight:600;
}

.card p{

    margin-top:2px;

    font-size:17px;

    font-weight:bold;

    color:white;
}

/* FILTERS */

.filter-container{

    width:100%;

    margin:4px 0;

    padding:6px;

    display:flex;

    gap:6px;

    flex-wrap:nowrap;

    overflow-x:auto;

    background:
    linear-gradient(
    135deg,
    #8fa8c7,
    #6f8fb8,
    #5f7faa,
    #4f6f99
    );

    border-radius:14px;

    box-shadow:
        0 3px 10px rgba(0,0,0,0.12);
}

.filter-container input,
.filter-container select{

    padding:7px 10px;

    border-radius:10px;

    border:none;

    min-width:160px;

    background:white;

    font-size:13px;

    color:#1e3a5f;

    box-shadow:
        inset 1px 1px 4px rgba(0,0,0,0.06),
        inset -1px -1px 4px rgba(255,255,255,0.8);
}

    .filter-container input:focus,
.filter-container select:focus{

    outline:none;

    border:1px solid #1e88e5;

    box-shadow:
        0 0 8px rgba(30,136,229,0.35);
}

/* TABLE */

  /* TABLE CONTAINER */

.table-container{
    width:100%;
    margin:0;
    padding:0;

    overflow-x:auto;
    overflow-y:auto;

    max-height:none;

    border-radius:0;

    box-sizing:border-box;

    scrollbar-width:none;
}


/* ===== 3D TABLE ===== */

table{
    border-collapse:collapse;

    width:100%;

    table-layout:auto;

    font-size:13px;

    margin:0;
}


/* ===== TABLE HEADERS ===== */

th{
    background:linear-gradient(
        135deg,
        #0b3d91,
        #1565c0,
        #1e88e5
    );

    color:white;

    padding:8px 10px;

    text-align:center;

    white-space:nowrap;

    position:sticky;
    top:0;
    z-index:2;

    font-size:13px;
    font-weight:bold;

    border:none;
}

/* ===== TABLE DATA ===== */

td{
    padding:6px 10px;

    text-align:center;

    white-space:nowrap;

    border-bottom:1px solid #e0e0e0;

    font-size:13px;

    transition:0.2s;
}
/* ===== ALTERNATE ROW COLORS ===== */

tr:nth-child(even) td{
    background:#fafcff;
}

/* ===== ROW HOVER EFFECT ===== */

tr:hover td{

    background:#e8ddff;

    color:#2d1457;

    transition:0.2s;
}

/* LOADING */

.loading{
    text-align:center;
    margin-top:30px;
    font-size:24px;
    color:#0b3d91;
}
    /* ===== ALWAYS SHOW HORIZONTAL SCROLL ===== */

.table-container{
    width:100%;
    margin:0;
    padding:0;

    overflow-x:auto;

    border-radius:0;

    box-sizing:border-box;
}

/* ===== GREEN SCROLLBAR ===== */

.table-container::-webkit-scrollbar{
    width:0px;
    height:8px;
}

.table-container::-webkit-scrollbar-track{
    background:#d7f5e8;
    border-radius:10px;
}

.table-container::-webkit-scrollbar-thumb{
    background:linear-gradient(
        135deg,
        #00b894,
        #00cec9
    );

    border-radius:10px;
}

/* ===== GREEN CURSOR FOCUS ===== */

input:focus,
select:focus{

    outline:none;

    border:2px solid #00b894;

    box-shadow:
        0 0 10px rgba(0,184,148,0.5);

    transition:0.3s;
}

/* ===== SEARCH BAR GREEN THEME ===== */

.search-box input{

    border:2px solid #b2f5ea;
}

.search-box input:focus{

    border:2px solid #00b894;

    box-shadow:
        0 0 12px rgba(0,184,148,0.4);
}
    

html,
body{

    overflow-y:auto;
}

.table-container{

    overflow-y:auto;
}

    
/* KEEP ONLY HORIZONTAL SCROLL */

.table-container{

    overflow-x:auto !important;
}

/* HIDE SCROLLBARS */

::-webkit-scrollbar:vertical{
    width:0px;
}

::-webkit-scrollbar-horizontal{
    height:8px;
}

    /* REMOVE ALL EXTRA SPACING */

*{
    box-sizing:border-box;
}

html,
body{
    width:100%;
    margin:0;
    padding:0;
    overflow-x:hidden;
}

    /* HIDE VERTICAL SCROLLBAR BUT ALLOW SCROLLING */

::-webkit-scrollbar{
    width:0px;
    height:8px;
}

    .header h3{

    margin-top:6px;

    color:#dfe9ff;

    font-size:15px;

    font-weight:500;

    letter-spacing:0.5px;
}

    /* CGPA TOOL CONTAINER */

.cgpa-tools{

    display:flex;

    gap:10px;

    margin-left:10px;

    padding:6px 10px;

    border-radius:14px;

    background:
    linear-gradient(
    135deg,
    #e3e8f0,
    #d6deea
    );

    box-shadow:
        0 3px 8px rgba(0,0,0,0.10);
}

/* EACH BOX */

.cgpa-box{

    display:flex;

    flex-direction:column;

    gap:4px;
}

/* HEADINGS */

.cgpa-box h3{

    margin:0;

    font-size:12px;

    color:#1b2a4a;

    font-weight:600;
}

/* INPUTS */

.cgpa-box input{

    width:80px;

    padding:5px 6px;

    border:none;

    border-radius:8px;

    font-size:12px;

    background:white;

    box-shadow:
        inset 1px 1px 4px rgba(0,0,0,0.08);
}

/* BETWEEN INPUTS */

.between-inputs{

    display:flex;

    gap:5px;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

    <h1>Mahatma Gandhi Institute of Technology</h1>

    <h2>Training & Placement Cell</h2>

     <h3>Total Students Data for the Academic Year 2025 - 2026</h3>

</div>

<!-- CARDS -->

<div class="cards-container">

    <div class="card">
        <h3>Total Students</h3>
        <p id="totalStudents">0</p>
    </div>

    <div class="card">
        <h3>Registered for Placements</h3>
        <p id="registeredStudents">0</p>
    </div>

    <div class="card">
        <h3>Eligible Students</h3>
        <p id="eligibleStudents">0</p>
    </div>

    <div class="card">
        <h3>Total Students Placed</h3>
        <p id="placedStudents">0</p>
    </div>

    <div class="card">
        <h3>Total Offers</h3>
        <p id="totalOffers">0</p>
    </div>
<div class="cgpa-tools">

    <div class="cgpa-box">

        <h3>CGPA ≤</h3>

        <input
        type="number"
        step="0.01"
        id="cgpaLessEqual"
        placeholder="Enter">

    </div>

    <div class="cgpa-box">

        <h3>CGPA ≥</h3>

        <input
        type="number"
        step="0.01"
        id="cgpaGreaterEqual"
        placeholder="Enter">

    </div>

    <div class="cgpa-box">

        <h3>Between CGPA</h3>

        <div class="between-inputs">

            <input
            type="number"
            step="0.01"
            id="cgpaMin"
            placeholder="Min">

            <input
            type="number"
            step="0.01"
            id="cgpaMax"
            placeholder="Max">

        </div>

    </div>

</div>

</div>
    

<!-- FILTERS -->

<div class="filter-container">

    <input type="text" id="searchInput" placeholder="Search Any Data">

    <select id="branchFilter">
        <option value="">Branch</option>
    </select>

    <select id="backlogFilter">
        <option value="">No. of Backlogs</option>
    </select>

    <select id="genderFilter">
        <option value="">Gender</option>
    </select>

    <select id="cgpaFilter">
        <option value="">CGPA</option>
    </select>

    <select id="registeredFilter">
        <option value="">Registered for Placements</option>
    </select>

    <select id="offersFilter">
        <option value="">No. of Offers</option>
    </select>

</div>

<!-- LOADING -->

<div class="loading" id="loading">
Loading Data...
</div>

<!-- TABLE -->

<div class="table-container">

    <table id="dataTable"></table>

</div>

```html
<script>

const csvURL = localStorage.getItem("csvURL");

let originalData = [];
let headers = [];

/* CHECK CSV URL */

if (!csvURL) {

    document.getElementById("loading").innerHTML =
    "CSV URL not found in localStorage";

} else {

    Papa.parse(csvURL, {

        download: true,
        skipEmptyLines: true,

        complete: function(results) {

            if (!results.data || results.data.length === 0) {

                document.getElementById("loading").innerHTML =
                "No data found in CSV";

                return;
            }

            headers = results.data[0];

            originalData = results.data.slice(1);

            populateFilters(originalData);

            applyFilters();

            document.getElementById("loading").style.display = "none";
        },

        error: function(error) {

            console.error(error);

            document.getElementById("loading").innerHTML =
            "Error Loading CSV File";
        }
    });
}

/* FILTER ELEMENTS */

const searchInput = document.getElementById("searchInput");

const branchFilter = document.getElementById("branchFilter");

const backlogFilter = document.getElementById("backlogFilter");

const genderFilter = document.getElementById("genderFilter");

const cgpaFilter = document.getElementById("cgpaFilter");

const registeredFilter =
document.getElementById("registeredFilter");

const offersFilter =
document.getElementById("offersFilter");

const cgpaLessEqual =
document.getElementById("cgpaLessEqual");

const cgpaGreaterEqual =
document.getElementById("cgpaGreaterEqual");

const cgpaMin =
document.getElementById("cgpaMin");

const cgpaMax =
document.getElementById("cgpaMax");

/* EVENTS */

searchInput.addEventListener("input", applyFilters);

branchFilter.addEventListener("change", applyFilters);

backlogFilter.addEventListener("change", applyFilters);

genderFilter.addEventListener("change", applyFilters);

cgpaFilter.addEventListener("change", applyFilters);

registeredFilter.addEventListener("change", applyFilters);

offersFilter.addEventListener("change", applyFilters);

cgpaLessEqual.addEventListener("input", applyFilters);

cgpaGreaterEqual.addEventListener("input", applyFilters);

cgpaMin.addEventListener("input", applyFilters);

cgpaMax.addEventListener("input", applyFilters);

/* POPULATE FILTERS */

function populateFilters(data) {

    fillFilter(branchFilter, "Branch", data);

    fillFilter(backlogFilter, "No. of Backlogs", data);

    fillFilter(genderFilter, "Gender", data);

    fillFilter(cgpaFilter, "CGPA", data);

    fillFilter(
        registeredFilter,
        "Registered for Placements",
        data
    );

    fillFilter(offersFilter, "No. of Offers", data);
}

/* FILL FILTER */

function fillFilter(filter, column, data) {

    const index = headers.indexOf(column);

    if (index === -1) return;

    let values = [...new Set(

        data.map(row => row[index])

    )];

    values = values.filter(v => v !== "");

    values.sort();

    filter.innerHTML =
    `<option value="">${column}</option>`;

    values.forEach(value => {

        filter.innerHTML +=
        `<option value="${value}">
            ${value}
        </option>`;
    });
}

/* APPLY FILTERS */
```javascript
function applyFilters(){

    const search =
    searchInput.value.toLowerCase();

    const filters = {

        branch: branchFilter.value,
        backlog: backlogFilter.value,
        gender: genderFilter.value,
        cgpa: cgpaFilter.value,
        registered: registeredFilter.value,
        offers: offersFilter.value
    };

    const indexes = {

        branch: headers.indexOf("Branch"),
        backlog: headers.indexOf("No. of Backlogs"),
        gender: headers.indexOf("Gender"),
        cgpa: headers.indexOf("CGPA"),
        registered:
        headers.indexOf("Registered for Placements"),
        offers:
        headers.indexOf("No. of Offers")
    };

    let filtered = originalData.filter(row => {

        const rowText =
        row.join(" ").toLowerCase();

        const cgpa =
        parseFloat(row[indexes.cgpa]) || 0;

        /* CUSTOM CGPA FILTERS */

        let cgpaCondition = true;

        /* CGPA <= */

        if(cgpaLessEqual.value !== ""){

            cgpaCondition =
            cgpa <= Number(cgpaLessEqual.value);
        }

        /* CGPA >= */

        else if(cgpaGreaterEqual.value !== ""){

            cgpaCondition =
            cgpa >= Number(cgpaGreaterEqual.value);
        }

        /* BETWEEN */

        else if(

            cgpaMin.value !== "" &&

            cgpaMax.value !== ""

        ){

            cgpaCondition =

            cgpa >= Number(cgpaMin.value) &&

            cgpa <= Number(cgpaMax.value);
        }

        return (

            rowText.includes(search) &&

            (!filters.branch ||

                row[indexes.branch] === filters.branch) &&

            (!filters.backlog ||

                row[indexes.backlog] === filters.backlog) &&

            (!filters.gender ||

                row[indexes.gender] === filters.gender) &&

            (!filters.cgpa ||

                row[indexes.cgpa] === filters.cgpa) &&

            (!filters.registered ||

                row[indexes.registered] === filters.registered) &&

            (!filters.offers ||

                row[indexes.offers] === filters.offers) &&

            cgpaCondition
        );
    });

    renderTable(filtered);

    updateStatistics(filtered);
}

/* RENDER TABLE */

function renderTable(data) {

    let tableHTML = "";

    /* TABLE HEADERS */

    tableHTML += "<thead><tr>";

    headers.forEach(header => {

        tableHTML +=
        `<th>${header}</th>`;
    });

    tableHTML += "</tr></thead>";

    /* TABLE BODY */

    tableHTML += "<tbody>";

    data.forEach(row => {

        tableHTML += "<tr>";

        row.forEach(cell => {

            tableHTML +=
            `<td>${cell}</td>`;
        });

        tableHTML += "</tr>";
    });

    tableHTML += "</tbody>";

    document.getElementById("dataTable")
    .innerHTML = tableHTML;
}

/* UPDATE STATISTICS */

function updateStatistics(data) {

    const indexes = {

        cgpa:
        headers.indexOf("CGPA"),

        registered:
        headers.indexOf(
            "Registered for Placements"
        ),

        offers:
        headers.indexOf("No. of Offers")
    };

    const totalStudents =
    data.length;

    const placedStudents =
    data.filter(row => {

        const offers =
        Number(row[indexes.offers]) || 0;

        return offers > 0;

    }).length;

    const totalOffers =
    data.reduce((sum, row) => {

        return sum +
        (Number(row[indexes.offers]) || 0);

    }, 0);

    const registeredStudents =
    data.filter(row => {

        return String(
            row[indexes.registered]
        )

        .toLowerCase()

        .trim() === "yes";

    }).length;

    const eligibleStudents =
    data.filter(row => {

        const cgpa =
        parseFloat(
            row[indexes.cgpa]
        ) || 0;

        const registered =
        String(
            row[indexes.registered]
        )

        .toLowerCase()

        .trim();

        return (

            cgpa >= 6.5 &&

            registered === "yes"
        );

    }).length;

    document.getElementById(
        "totalStudents"
    ).innerText = totalStudents;

    document.getElementById(
        "placedStudents"
    ).innerText = placedStudents;

    document.getElementById(
        "totalOffers"
    ).innerText = totalOffers;

    document.getElementById(
        "registeredStudents"
    ).innerText = registeredStudents;

    document.getElementById(
        "eligibleStudents"
    ).innerText = eligibleStudents;
}

</script>
