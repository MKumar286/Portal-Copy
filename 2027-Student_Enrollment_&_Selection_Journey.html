<!DOCTYPE html>
<html>
<head>

<title>MGIT Placement Portal</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
padding:15px;
padding-bottom: 80px; /* Space so the download button doesn't block the last table row */
overflow-x:hidden;
color:white;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c1c3c);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
min-height:100vh;
}

/* Animated Background */

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Floating Glow */

body::before{
content:"";
position:fixed;
width:500px;
height:500px;
background:rgba(0,198,255,0.15);
border-radius:50%;
top:-120px;
left:-120px;
filter:blur(100px);
animation:float1 10s infinite alternate;
z-index:-1;
}

body::after{
content:"";
position:fixed;
width:400px;
height:400px;
background:rgba(255,0,150,0.15);
border-radius:50%;
bottom:-100px;
right:-100px;
filter:blur(100px);
animation:float2 12s infinite alternate;
z-index:-1;
}

@keyframes float1{
from{transform:translateY(0px);}
to{transform:translateY(80px);}
}

@keyframes float2{
from{transform:translateX(0px);}
to{transform:translateX(-80px);}
}

/* HEADER */

.header-box{
background:linear-gradient(135deg,#000814,#001d3d,#003566);
padding:15px 10px;
border-radius:18px 18px 0 0;
margin-bottom:0;
box-shadow:0 6px 20px rgba(0,0,0,0.35);
border:1px solid rgba(255,255,255,0.15);
border-bottom:none;
text-align:center;
}


/* HEADINGS */

h1{
font-size:34px;
font-weight:bold;
background:linear-gradient(90deg,#ffffff,#ffe082,#ffffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:8px;
letter-spacing:1px;
}

h3{
font-size:18px;
margin-top:2px;
font-weight:500;
background:linear-gradient(90deg,#b2ff59,#00e5ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* STATS CONTAINER & CARDS */
.stats-container {
display: flex;
flex-direction: column;
background: linear-gradient(135deg, #051329, #0a2246);
padding: 10px;
border-left: 1px solid rgba(255,255,255,0.15);
border-right: 1px solid rgba(255,255,255,0.15);
gap: 8px;
}

.stats-row {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
gap: 8px;
width: 100%;
}

.stats-card {
background: rgba(255, 255, 255, 0.06);
border-radius: 8px;
padding: 6px 8px;
font-size: 11px;
line-height: 1.2;
color: #e0e6ed;
display: flex;
flex-direction: column;
justify-content: center;
box-shadow: 0 4px 15px rgba(0,0,0,0.2);
transition: transform 0.2s;
min-height: 52px;
}

.stats-card:hover {
transform: translateY(-2px);
}

.stats-card span {
font-weight: bold;
font-size: 15px;
margin-top: 2px;
}

/* Unique Vibrant Border and Text Color Mapping */
.border-blue { border: 1px solid #00bcff; }
.border-blue span { color: #00bcff; }

.border-cyan { border: 1px solid #00f5d4; }
.border-cyan span { color: #00f5d4; }

.border-orange { border: 1px solid #ff9f1c; }
.border-orange span { color: #ff9f1c; }

.
