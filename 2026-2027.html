<!DOCTYPE html>

<style>

body{
    margin:0;
    padding:20px;
    font-family:Arial;
    background:#f2f5ff;
}

h1{
    text-align:center;
    color:#0b3d91;
}

}

.cards-container{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin-top:25px;
}
.card{
    height:85px;
    border-radius:22px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    transition:all 0.3s ease;
    box-shadow:0 8px 20px rgba(0,0,0,0.18);
    backdrop-filter:blur(8px);
    letter-spacing:0.5px;
    text-align:center;
    padding:10px;
}

.card:hover{
    transform:translateY(-6px) scale(1.03);
    box-shadow:0 12px 25px rgba(0,0,0,0.25);
}

.card:hover{
    transform:scale(1.05);
}

table{
    width:100%;
    margin-top:25px;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

th{
    background:#0b3d91;
    color:white;
}

.loading{
    text-align:center;
    margin-top:20px;
    font-size:20px;
    color:#0b3d91;
}

</style>
</head>

function loadCSV(url){

    if(url===""){
        alert("CSV Link Not Added");
        return;
    }

    document.getElementById("loading").innerHTML="Loading Data...";

    Papa.parse(url,{

        download:true,

        complete:function(results){

            let data=results.data;

            let tableHTML="";

            data.forEach((row,rowIndex)=>{

                tableHTML+="<tr>";

                row.forEach(cell=>{

                    if(rowIndex===0){
                        tableHTML+=`<th>${cell}</th>`;
                    }else{
                        tableHTML+=`<td>${cell}</td>`;
                    }

                });

                tableHTML+="</tr>";

            });

            document.getElementById("dataTable").innerHTML=tableHTML;

            document.getElementById("loading").innerHTML="";

        },

        error:function(){

            document.getElementById("loading").innerHTML="Unable to Load CSV Data";

        }

    });

}
